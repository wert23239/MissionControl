<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Midtown Spurs Bars</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#07111f;color:#f8fafc}
#map{height:100%;width:100%}
.leaflet-popup-content{font-size:14px;line-height:1.45;margin:12px 14px;color:#111827}
.leaflet-popup-content b{font-size:15px;color:#0f172a}
.leaflet-popup-content a{color:#2563eb;text-decoration:none;font-weight:700}
.leaflet-popup-content small{color:#475569}
.leaflet-control-zoom a{background:#0f172a!important;color:#fff!important;border-color:#334155!important}
.pin{border:2px solid #fff;border-radius:999px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 3px 10px rgba(0,0,0,.45)}
.pin.home{background:#2563eb}.pin.bar{background:#111827}.pin.pick{background:#16a34a}.pin.official{background:#7c3aed}
.panel{position:absolute;z-index:999;left:12px;right:12px;top:12px;pointer-events:none}
.card{max-width:560px;margin:0 auto;background:rgba(8,13,25,.88);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:14px;box-shadow:0 14px 40px rgba(0,0,0,.35);pointer-events:auto}
h1{font-size:20px;letter-spacing:-.03em;margin-bottom:4px}.sub{font-size:13px;color:#cbd5e1;margin-bottom:10px}.legend{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}.pill{font-size:12px;border:1px solid rgba(255,255,255,.18);border-radius:999px;padding:5px 8px;background:rgba(255,255,255,.08)}
.list{display:grid;gap:7px}.row{display:grid;grid-template-columns:auto 1fr auto;gap:9px;align-items:center;padding:8px;border-radius:12px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.08)}
.rank{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#0f172a;border:1px solid rgba(255,255,255,.22);font-size:12px;font-weight:800}.row.best .rank{background:#16a34a}.row.official .rank{background:#7c3aed}
.name{font-weight:800;font-size:13px}.meta{font-size:12px;color:#cbd5e1}.tag{font-size:11px;color:#e2e8f0;background:rgba(255,255,255,.1);border-radius:999px;padding:4px 7px;white-space:nowrap}
@media(max-width:560px){.card{padding:12px}.list{max-height:310px;overflow:auto}.row{grid-template-columns:auto 1fr}.tag{grid-column:2}.panel{top:8px;left:8px;right:8px}}
</style>
</head>
<body>
<div id="map"></div>
<div class="panel">
  <div class="card">
    <h1>5 bars near W 49th + 6th for the Spurs game</h1>
    <div class="sub">Closest sports-friendly picks around Rockefeller / Times Square. Tap markers for directions.</div>
    <div class="legend"><span class="pill">⭐ best bet</span><span class="pill">📺 lots of TVs</span><span class="pill">⚽ official Spurs caveat: Flannery’s is Union Sq, not nearby</span></div>
    <div class="list" id="barList"></div>
  </div>
</div>
<script>
const origin={name:"You-ish: W 49th St + 6th Ave",lat:40.75942,lng:-73.98095};
const map=L.map('map',{zoomControl:false}).setView([40.7609,-73.9818],15);
L.control.zoom({position:'bottomright'}).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'&copy; OSM &copy; CARTO',maxZoom:19}).addTo(map);
const icon=(emoji,cls='bar')=>L.divIcon({className:'',html:`<div class="pin ${cls}">${emoji}</div>`,iconSize:[32,32],iconAnchor:[16,16],popupAnchor:[0,-18]});
const bars=[
 {rank:1,name:"Playwright Irish Pub",lat:40.76080,lng:-73.98483,type:"⭐",cls:"pick",vibe:"Best nearby sports-bar bet: dozens of HDTVs, Irish pub, open late.",addr:"202 W 49th St",walk:"~5 min",tag:"best bet"},
 {rank:2,name:"Tonic Times Square",lat:40.75955,lng:-73.98431,type:"📺",vibe:"Three floors, giant TVs, very easy for a big game crowd.",addr:"727 7th Ave",walk:"~5 min",tag:"big screens"},
 {rank:3,name:"Connolly’s Pub & Restaurant",lat:40.75718,lng:-73.98336,type:"🍺",vibe:"Huge Irish pub setup, 45 flat-screen TVs, good group fallback.",addr:"121 W 45th St",walk:"~7 min",tag:"most TVs"},
 {rank:4,name:"The Three Monkeys",lat:40.76435,lng:-73.98370,type:"🐒",vibe:"Tri-level sports bar, lots of flat-screens, strong beer list.",addr:"236 W 54th St",walk:"~9 min",tag:"beer + TVs"},
 {rank:5,name:"Judge Roy Bean Public House",lat:40.76263,lng:-73.97623,type:"🤠",vibe:"Solid pub east of 6th, sports-friendly, less Times Square chaos.",addr:"38 W 56th St",walk:"~10 min",tag:"chiller"},
];
L.marker([origin.lat,origin.lng],{icon:icon('📍','home')}).addTo(map).bindPopup(`<b>${origin.name}</b><br><small>Starting point</small>`);
bars.forEach(b=>{
 const gmaps=`https://maps.google.com/?q=${encodeURIComponent(b.name+' '+b.addr+' New York NY')}`;
 L.marker([b.lat,b.lng],{icon:icon(b.type,b.cls)}).addTo(map).bindPopup(`<b>${b.rank}. ${b.type} ${b.name}</b><br>${b.vibe}<br><small>${b.addr} • ${b.walk} walk</small><br><a href="${gmaps}" target="_blank">📍 Directions</a>`);
 L.polyline([[origin.lat,origin.lng],[b.lat,b.lng]],{color:b.rank===1?'#22c55e':'#94a3b8',weight:b.rank===1?3:1,opacity:b.rank===1?.8:.35,dashArray:b.rank===1?null:'4 8'}).addTo(map);
});
map.fitBounds([[40.7568,-73.9860],[40.7651,-73.9753]],{padding:[80,30]});
const list=document.getElementById('barList');
list.innerHTML=bars.map(b=>`<div class="row ${b.rank===1?'best':''}"><div class="rank">${b.rank}</div><div><div class="name">${b.type} ${b.name}</div><div class="meta">${b.walk} • ${b.addr}</div></div><div class="tag">${b.tag}</div></div>`).join('');
</script>
</body>
</html>
