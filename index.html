<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alex Mission Control</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#1a1625;--card:rgba(255,255,255,0.03);--card2:rgba(255,255,255,0.05);--accent:#e879f9;--accent2:#c026d3;--text:#e8e0f0;--text2:#665c78;--green:#22c55e;--amber:#f59e0b;--purple:#a855f7;--red:#ef4444;--border:rgba(255,255,255,0.06);--cyan:#22d3ee;--sidebar-bg:linear-gradient(180deg,#231e30,#1a1625);--hover-border:rgba(232,121,249,0.2)}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}

/* Sidebar */
.sidebar{width:260px;background:linear-gradient(180deg,#231e30,#1a1625);display:flex;flex-direction:column;flex-shrink:0;padding:16px 0}
.space-tabs{display:flex;gap:4px;padding:0 12px;margin-bottom:16px}
.space-tab{flex:1;height:4px;border-radius:2px;background:#2a2535;cursor:pointer;transition:all 0.2s}
.space-tab.active{background:linear-gradient(90deg,#e879f9,#7c3aed)}
.sidebar-header{padding:8px 16px 12px;display:flex;align-items:center;gap:10px}
.sidebar-header h1{font-size:15px;font-weight:700;color:#e879f9}
.sidebar-header .status{font-size:11px;color:#22c55e;display:flex;align-items:center;gap:5px}
.sidebar-header .status::before{content:'';width:6px;height:6px;background:#22c55e;border-radius:50%;display:inline-block}
.sidebar-section{padding:4px 12px;font-size:10px;color:#555;text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-top:8px}
.sidebar-divider{height:1px;background:#2a2535;margin:12px 16px}
.sidebar-nav{flex:1;overflow-y:auto;padding:0}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;color:#998eb5;transition:all .15s;margin:2px 8px}
.nav-item:hover{background:rgba(255,255,255,0.05);color:#d4c4f0}
.nav-item.active{background:rgba(232,121,249,0.1);color:#e879f9;font-weight:600}
.nav-item .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.nav-item .icon{font-size:16px;width:20px;text-align:center}
.sidebar-footer{padding:12px 16px;font-size:11px;color:#665c78;text-align:center}

/* Main */
.main{flex:1;overflow-y:auto;padding:28px}
.url-bar{background:#231e30;border-radius:12px;padding:10px 16px;display:flex;align-items:center;gap:8px;margin-bottom:24px;font-size:13px;color:#665c78}
.panel{display:none;animation:fadeIn .3s}
.panel.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.panel-title{font-size:26px;font-weight:800;color:#e8e0f0;margin-bottom:4px}
.panel-sub{font-size:13px;color:#665c78;margin-bottom:20px}

/* Stat cards */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-bottom:20px}
.stat{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:18px;transition:all 0.2s}
.stat:hover{background:rgba(255,255,255,0.06);border-color:rgba(232,121,249,0.2)}
.stat-label{font-size:11px;color:#665c78;text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:6px}
.stat-value{font-size:28px;font-weight:800;color:#e879f9}
.stat-value.cyan{color:#22d3ee}
.stat-value.white{color:#e8e0f0}
.stat-value.green{color:#22c55e}
.stat-value.amber{color:#f59e0b}
.stat-sub{font-size:11px;color:#665c78;margin-top:4px}

/* Cards grid */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px}
.card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:20px;transition:all 0.2s}
.card:hover{background:rgba(255,255,255,0.06);border-color:rgba(232,121,249,0.2)}
.card h3{font-size:12px;font-weight:700;color:#665c78;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px}

/* Tags */
.tag{display:inline-block;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:600}
.tag-book{background:rgba(245,158,11,.12);color:#f59e0b}
.tag-infra{background:rgba(34,211,238,.12);color:#22d3ee}
.tag-human{background:rgba(232,121,249,.12);color:#e879f9}
.tag-design{background:rgba(168,85,247,.12);color:#a855f7}

/* Progress bar */
.progress-wrap{margin-bottom:20px}
.progress-label{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;color:#998eb5}
.progress-bar{height:8px;background:#2a2535;border-radius:4px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;transition:width .5s}

/* Timeline */
.timeline-item{display:flex;gap:12px;padding:8px 0;font-size:13px;align-items:flex-start;color:#d4c4f0}
.timeline-time{color:#e879f9;font-weight:600;min-width:50px}
.timeline-dot{width:8px;height:8px;background:#e879f9;border-radius:50%;margin-top:5px;flex-shrink:0}

/* Quick links */
.quick-link{display:flex;align-items:center;gap:10px;padding:14px;background:rgba(255,255,255,0.03);border-radius:12px;text-decoration:none;color:#d4c4f0;font-size:13px;font-weight:500;transition:all .2s;border:1px solid rgba(255,255,255,0.06)}
.quick-link:hover{border-color:rgba(232,121,249,0.3);background:rgba(255,255,255,0.06)}

/* Kanban */
.kanban-col h4{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;color:#665c78}
.kanban-item{background:rgba(255,255,255,0.04);border-radius:10px;padding:12px;margin-bottom:8px;font-size:13px;color:#d4c4f0;border:1px solid rgba(255,255,255,0.04);transition:all 0.2s}
.kanban-item:hover{border-color:rgba(232,121,249,0.15)}
.kanban-item .tag{margin-top:6px}

/* Chapter table */
.ch-table{width:100%;border-collapse:collapse;font-size:13px}
.ch-table th{text-align:left;padding:10px 12px;border-bottom:1px solid rgba(255,255,255,0.08);color:#665c78;font-weight:600;font-size:11px;text-transform:uppercase}
.ch-table td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,0.04);color:#d4c4f0}
.ch-table tr:hover{background:rgba(255,255,255,0.03)}

/* Skills grid */
.skill-card{display:flex;align-items:center;gap:12px;padding:14px;background:rgba(255,255,255,0.04);border-radius:12px;font-size:13px;border:1px solid rgba(255,255,255,0.04);transition:all 0.2s}
.skill-card:hover{border-color:rgba(232,121,249,0.15)}
.skill-icon{font-size:24px;width:36px;text-align:center}
.skill-info{flex:1}
.skill-info .name{font-weight:600;color:#d4c4f0}
.skill-info .desc{font-size:11px;color:#665c78;margin-top:2px}
.badge{padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;text-transform:uppercase}
.badge-green{background:rgba(34,197,94,.12);color:#22c55e}
.badge-yellow{background:rgba(245,158,11,.12);color:#f59e0b}

/* Revenue ideas */
.idea-item{display:flex;justify-content:space-between;align-items:center;padding:14px;background:rgba(255,255,255,0.04);border-radius:10px;margin-bottom:8px;font-size:13px;color:#d4c4f0;border:1px solid rgba(255,255,255,0.04)}
.idea-priority{font-size:11px;font-weight:700;padding:3px 10px;border-radius:6px}
.idea-priority.high{background:rgba(34,197,94,.12);color:#22c55e}
.idea-priority.idea{background:rgba(34,211,238,.12);color:#22d3ee}
.idea-priority.low{background:rgba(255,255,255,.06);color:#665c78}

/* Notes */
.notes-input{display:flex;gap:8px;margin-bottom:16px}
.notes-input input,.notes-input select{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:10px 14px;color:#e8e0f0;font-family:inherit;font-size:13px;transition:border-color 0.2s}
.notes-input input:focus,.notes-input select:focus{outline:none;border-color:rgba(232,121,249,0.4);box-shadow:0 0 0 3px rgba(232,121,249,0.1)}
.notes-input input{flex:1}
.notes-input select{min-width:120px}
.notes-input button{background:linear-gradient(135deg,#e879f9,#7c3aed);color:#fff;border:none;border-radius:10px;padding:10px 20px;font-family:inherit;font-weight:600;cursor:pointer;font-size:13px;transition:all 0.2s}
.notes-input button:hover{opacity:0.9;transform:translateY(-1px)}

/* Bingo */
.bingo-cell{background:linear-gradient(135deg,rgba(139,92,246,0.08),rgba(232,121,249,0.05));border:1px solid rgba(139,92,246,0.15);border-radius:12px;padding:12px 8px;text-align:center;cursor:pointer;font-size:12px;font-weight:600;color:#e2d5f8;line-height:1.3;min-height:80px;display:flex;align-items:center;justify-content:center;transition:all .3s cubic-bezier(.4,0,.2,1);position:relative;user-select:none;box-shadow:0 2px 8px rgba(0,0,0,0.15)}
.bingo-cell:hover{border-color:rgba(232,121,249,0.5);background:linear-gradient(135deg,rgba(139,92,246,0.18),rgba(232,121,249,0.12));transform:translateY(-2px) scale(1.03);box-shadow:0 6px 20px rgba(232,121,249,0.15)}
.bingo-cell.done{background:linear-gradient(135deg,rgba(34,197,94,0.15),rgba(16,185,129,0.1));border-color:rgba(34,197,94,0.4);color:#6ee7b7;text-decoration:none;box-shadow:0 0 12px rgba(34,197,94,0.1)}
.bingo-cell.done::after{content:'✅';position:absolute;top:4px;right:4px;font-size:12px;filter:drop-shadow(0 0 4px rgba(34,197,94,0.4))}
.bingo-cell.done .cell-text{text-decoration:line-through;opacity:0.7}
.bingo-cell.free{background:linear-gradient(135deg,rgba(250,204,21,0.12),rgba(232,121,249,0.1));border-color:rgba(250,204,21,0.35);cursor:default;font-size:13px;color:#fde68a;animation:freeGlow 3s ease-in-out infinite;box-shadow:0 0 15px rgba(250,204,21,0.08)}
.bingo-cell.crossed{background:linear-gradient(135deg,rgba(239,68,68,0.12),rgba(239,68,68,0.06));border-color:rgba(239,68,68,0.35);text-decoration:line-through;color:#fca5a5;opacity:0.7}
@keyframes freeGlow{0%,100%{box-shadow:0 0 15px rgba(250,204,21,0.08)}50%{box-shadow:0 0 25px rgba(250,204,21,0.18)}}
.filter-tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.filter-tab{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;background:rgba(255,255,255,0.04);color:#998eb5;border:1px solid rgba(255,255,255,0.06);font-family:inherit;transition:all 0.2s}
.filter-tab:hover{background:rgba(255,255,255,0.06);color:#d4c4f0}
.filter-tab.active,.filter-btn.active{background:rgba(232,121,249,0.15);color:#e879f9;border-color:rgba(232,121,249,0.3)}
.filter-btn{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;background:rgba(255,255,255,0.04);color:#998eb5;border:1px solid rgba(255,255,255,0.06);font-family:inherit;transition:all 0.2s}
.filter-btn:hover{background:rgba(255,255,255,0.06);color:#d4c4f0}
.note-item{display:flex;align-items:flex-start;gap:10px;padding:12px;background:rgba(255,255,255,0.04);border-radius:10px;margin-bottom:6px;font-size:13px;color:#d4c4f0;border:1px solid rgba(255,255,255,0.04)}
.note-collapsed .note-long{display:none}.note-collapsed .note-short{display:block}
.note-expanded .note-short{display:none}.note-expanded .note-long{display:block}
.note-short,.note-long{display:none}.note-expanded .note-long,.note-collapsed .note-short{display:block}
.note-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0}
.note-content{flex:1}
.note-meta{font-size:11px;color:#665c78;margin-top:4px}
.note-del{background:none;border:none;color:#ef4444;cursor:pointer;font-size:16px;padding:0 4px}
.empty-state{text-align:center;padding:40px;color:#665c78;font-size:14px}

/* Expenses */
.expense-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:13px;color:#d4c4f0}
.expense-row:last-child{border:none}

/* Notebook tabs */
.nb-tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid rgba(255,255,255,0.06);padding-bottom:8px}
.nb-tab{padding:8px 16px;border-radius:8px 8px 0 0;cursor:pointer;font-size:13px;font-weight:600;color:#998eb5;background:none;border:none;font-family:inherit;transition:all 0.2s}
.nb-tab:hover{color:#d4c4f0;background:rgba(255,255,255,0.04)}
.nb-tab.active{color:#e879f9;border-bottom:2px solid #e879f9}
.nb-section{display:none}.nb-section.active{display:block}

/* Mobile */
@media(max-width:768px){
  body{flex-direction:column;height:auto;overflow:auto}
  .sidebar{width:100%;height:auto;flex-direction:column;position:sticky;top:0;z-index:100;padding:8px 0}
  .space-tabs{margin-bottom:8px}
  .sidebar-header{padding:4px 12px 4px;display:flex;align-items:center;gap:8px}
  .sidebar-header h1{font-size:13px;display:inline}
  .sidebar-header .status{font-size:10px;margin-top:0}
  .sidebar-section,.sidebar-divider{display:none}
  .sidebar-nav{display:flex;flex-direction:row;overflow-x:auto;padding:0 8px 8px;gap:2px;-webkit-overflow-scrolling:touch}
  .nav-item{padding:6px 10px;font-size:11px;white-space:nowrap;gap:4px;margin:0;flex-shrink:0;border-radius:6px}
  .nav-item .dot{width:6px;height:6px}
  .nav-item .icon{font-size:13px;width:auto}
  .sidebar-footer{display:none}
  .main{padding:14px;min-height:calc(100vh - 90px);overflow-y:auto}
  .url-bar{margin-bottom:14px;padding:8px 12px;font-size:12px}
  .panel-title{font-size:20px;margin-bottom:4px}
  .stats{grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
  .stat{padding:14px}
  .stat-label{font-size:10px}
  .stat-value{font-size:22px}
  .stat-sub{font-size:10px}
  .grid2,.grid3{grid-template-columns:1fr;gap:10px}
  .card{padding:14px}
  .ch-table{font-size:11px}
  .ch-table th,.ch-table td{padding:6px 8px}
  .notes-input{flex-wrap:wrap}
  .notes-input input{min-width:0;width:100%}
  .notes-input select{min-width:80px;font-size:11px}
  .quick-link{font-size:12px;padding:10px}
  .idea-item{flex-direction:column;align-items:flex-start;gap:6px}
  .skill-card{padding:10px}
  div[style*="grid-template-columns:repeat(5"]{grid-template-columns:repeat(5,1fr)!important;gap:3px!important}
  .bingo-cell{min-height:48px;font-size:8px;padding:4px 2px;word-break:break-word}
  .expense-row{font-size:12px}
}
</style>
</head>

<script>
const sections=[
  {id:'overview',icon:'🏠',label:'Overview',dot:'#e879f9'},
  {id:'projects',icon:'🚀',label:'Projects',dot:'#22d3ee'},

// Insert dividers after certain items

function tag(t,c){return `<span class="tag tag-${t}">${t}</span>`}
function stat(label,value,sub=''){return `<div class="stat"><div class="stat-label">${label}</div><div class="stat-value">${value}</div>${sub?`<div class="stat-sub">${sub}</div>`:''}</div>`}
function progress(label,pct,color='#e879f9'){return `<div class="progress-wrap"><div class="progress-label"><span>${label}</span><span>${pct}%</span></div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${color}"></div></div></div>`}
function kanbanItem(t,type){return `<div class="kanban-item">${t}<br>${tag(type)}</div>`}

const panels={
overview:`<h2 class="panel-title">🏠 Overview</h2>
<div class="panel-sub">Command center • everything at a glance</div>
<div class="stats">
${stat('Day','1','Feb 14, 2026 — born today!')}

</div>
</div>
<h3 style="font-size:13px;margin-bottom:12px;color:#665c78;text-transform:uppercase;letter-spacing:0.5px;font-weight:700">Quick Links</h3>
<div class="grid2" style="margin-bottom:28px">
<a class="quick-link" href="https://github.com/wert23239/HyperReality" target="_blank">🐙 GitHub — wert23239/HyperReality</a>
<a class="quick-link" href="http://localhost:3000" target="_blank">🌐 Local Site — localhost:3000</a>
<a class="quick-link" href="#" onclick="return false">💬 Discord — openclawboy #9415</a>

</div>
<h3 style="font-size:13px;margin-bottom:12px;color:#665c78;text-transform:uppercase;letter-spacing:0.5px;font-weight:700">Today's Activity</h3>
<div class="card">
${[['1:08','Alex boot — system initialized'],['1:20','Discord connected — openclawboy online'],['1:31','GitHub + repo — wert23239/HyperReality'],['1:56','Site v3 — built and deployed locally'],['3:14','Brave Search API + Mac app + Canvas'],['3:30','Dashboard v1 built'],['4:00','17 skills installed from ClawHub'],['4:30','OpenClaw news roundup — 180k GitHub stars!'],['5:00','Prediction market arbitrage research'],['5:18','Money tab merged, TODO.md created'],['5:20','Daily tip cron set up (11 PM)']].map(([t,d])=>`<div class="timeline-item"><span class="timeline-time">${t}</span><span class="timeline-dot"></span><span>${d}</span></div>`).join('')}
</div>`,

notebook:`<h2 class="panel-title">📋 Notebook</h2>
<div class="panel-sub">Tasks, notes, and daily wins</div>
<div class="nb-tabs">

deepgram:`<h2 class="panel-title">🎙️ Deepgram STT Degradation Investigation</h2>
<div class="panel-sub">Voice agent transcription quality has dropped over the past year — deep dive into all possible causes</div>

<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px;margin-bottom:24px">
<div class="stat"><div class="stat-label">Possible Causes</div><div class="stat-value" style="color:#06b6d4">18</div></div>
<div class="stat"><div class="stat-label">Answered from Code</div><div class="stat-value" style="color:#22c55e">11/15</div></div>
<div class="stat"><div class="stat-label">Need Alex Input</div><div class="stat-value" style="color:#f59e0b">4</div></div>
<div class="stat"><div class="stat-label">Status</div><div class="stat-value" style="color:#06b6d4">Code Review Done</div></div>
</div>

<h3 style="font-size:12px;font-weight:700;color:#665c78;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px">🔬 Codebase Analysis — Key Findings</h3>
<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:24px">

<div class="kanban-item" style="border-left:3px solid #ef4444;padding-left:12px">
<span style="color:#ef4444;font-weight:700">🚨 CRITICAL: endpointing=10</span><br>
<span style="color:#998eb5;font-size:12px">Default English transcriber uses <code style="background:rgba(6,182,212,0.15);padding:1px 4px;border-radius:3px;font-size:10px">endpointing=10</code> (10ms). The code itself has a comment: <em>"use 300 if missing some transcriptions due to shorter context window. higher latency"</em>. With 10ms endpointing, Deepgram cuts audio at the slightest pause — drug names, addresses, and phone numbers get chopped. Spanish config has smartEndpointingPlan with livekit but English does NOT. This is the #1 suspect.</span>
</div>

<div class="kanban-item" style="border-left:3px solid #ef4444;padding-left:12px">
<span style="color:#ef4444;font-weight:700">🚨 CRITICAL: No encoding/sample_rate set</span><br>
<span style="color:#998eb5;font-size:12px">The transcriber config does NOT explicitly set <code style="background:rgba(6,182,212,0.15);padding:1px 4px;border-radius:3px;font-size:10px">encoding</code> or <code style="background:rgba(6,182,212,0.15);padding:1px 4px;border-radius:3px;font-size:10px">sample_rate</code>. Telephony audio is mulaw 8kHz — if VAPI or Twilio changed their default codec/format, Deepgram would silently misinterpret the audio. The voice-testing scripts explicitly generate <code style="background:rgba(6,182,212,0.15);padding:1px 4px;border-radius:3px;font-size:10px">ulaw_8000</code> format, confirming this IS the expected format, but it's never declared to Deepgram.</span>
</div>

<div class="kanban-item" style="border-left:3px solid #f59e0b;padding-left:12px">
<span style="color:#f59e0b;font-weight:700">⚠️ HIGH: smartDenoisingPlan enabled</span><br>
<span style="color:#998eb5;font-size:12px"><code style="background:rgba(6,182,212,0.15);padding:1px 4px;border-radius:3px;font-size:10px">backgroundSpeechDenoisingPlan.smartDenoisingPlan.enabled=true</code> is set on every call. Deepgram's own docs warn that noise reduction can DEGRADE accuracy by removing spectral information the model needs. Phone calls already have limited bandwidth — adding denoising on top may be stripping useful audio data.</span>
</div>

<div class="kanban-item" style="border-left:3px solid #f59e0b;padding-left:12px">
<span style="color:#f59e0b;font-weight:700">⚠️ HIGH: English vs Spanish config gap</span><br>
<span style="color:#998eb5;font-size:12px">Spanish config has significantly better STT settings: smartEndpointingPlan (livekit with sigmoid function), transcriptionEndpointingPlan (punctuation=0.3s, noPunctuation=0.6s, number=0.5s), and customEndpointingRules for insurance/DOB/phone. English config has NONE of these — just raw endpointing=10. If Spanish calls transcribe better than English, this is why.</span>
</div>

<div class="kanban-item" style="border-left:3px solid #06b6d4;padding-left:12px">
<span style="color:#06b6d4;font-weight:700">💡 INSIGHT: TTS is Cartesia, NOT ElevenLabs</span><br>
<span style="color:#998eb5;font-size:12px">Default voice is Cartesia sonic-3 (voiceId: f9836c6e) at speed 0.8. Original investigation assumed ElevenLabs — cause #4 (ElevenLabs echo bleed) doesn't apply. However, Cartesia model updates (sonic-2→sonic-3) could still change the audio spectral profile and break echo cancellation tuning.</span>
</div>

<div class="kanban-item" style="border-left:3px solid #06b6d4;padding-left:12px">
<span style="color:#06b6d4;font-weight:700">💡 INSIGHT: Flux already in use for English</span><br>
<span style="color:#998eb5;font-size:12px"><code style="background:rgba(6,182,212,0.15);padding:1px 4px;border-radius:3px;font-size:10px">flux-general-en</code> with eotThreshold=0.7 and eotTimeoutMs=5000. Nova-3 only for Spanish/multilingual. Azure fallback configured for both. Flux has native end-of-turn detection which should help, but the endpointing=10 may override or conflict with Flux's built-in turn detection.</span>
</div>

<div class="kanban-item" style="border-left:3px solid #06b6d4;padding-left:12px">
<span style="color:#06b6d4;font-weight:700">💡 INSIGHT: Keyterms well-configured but narrow</span><br>
<span style="color:#998eb5;font-size:12px">Dynamic keyterms include patient names, facility names, cities, provider names (tokenized). Static keyterms: gender identifiers, Spanish phrases, "Ambetter" (insurance). Missing: common medical terms, drug names, procedure names. The keyterms.json has only 41 entries — no medical vocabulary boosting at all.</span>
</div>

<div class="kanban-item" style="border-left:3px solid #06b6d4;padding-left:12px">
<span style="color:#06b6d4;font-weight:700">💡 INSIGHT: VAPI is a black box layer</span><br>
<span style="color:#998eb5;font-size:12px">No Deepgram SDK used. Everything goes through VAPI's API (api.vapi.ai). Audio pipeline: Twilio → VAPI → Deepgram. Any VAPI infrastructure changes (the known 200ms clipping issue, codec changes, resampling) are invisible. No audio logging at the VAPI handoff point. VAPI version is not pinned.</span>
</div>

<div class="kanban-item" style="border-left:3px solid #998eb5;padding-left:12px">
<span style="color:#998eb5;font-weight:700">📝 NOTE: stopSpeakingPlan may be too aggressive</span><br>
<span style="color:#998eb5;font-size:12px"><code style="background:rgba(6,182,212,0.15);padding:1px 4px;border-radius:3px;font-size:10px">numWords=2, voiceSeconds=0.2</code> — the agent stops speaking after detecting just 2 words or 0.2s of voice. Combined with endpointing=10, this creates a very "jumpy" conversation where the agent and patient constantly interrupt each other. More interruptions = more audio overlap = worse STT.</span>
</div>

<div class="kanban-item" style="border-left:3px solid #998eb5;padding-left:12px">
<span style="color:#998eb5;font-weight:700">📝 NOTE: mipOptOut=true costs 50% more</span><br>
<span style="color:#998eb5;font-size:12px">Code comment: "we will lose 50% discount when opting out." This opts out of Deepgram's model improvement program. No direct accuracy impact, but worth knowing for cost analysis.</span>
</div>

</div>

<h3 style="font-size:12px;font-weight:700;color:#665c78;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px">🎯 Recommended Action Plan (Priority Order)</h3>
<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:24px">
<div class="kanban-item"><span style="color:#ef4444;font-weight:700">P0:</span> A/B test endpointing=10 vs endpointing=255 on English calls. Measure WER on same audio. The comment in code already knows this is a problem.</div>
<div class="kanban-item"><span style="color:#ef4444;font-weight:700">P0:</span> Explicitly set <code style="background:rgba(6,182,212,0.15);padding:1px 4px;border-radius:3px;font-size:10px">encoding=mulaw&sample_rate=8000</code> in transcriber config. Never rely on defaults for telephony audio.</div>
<div class="kanban-item"><span style="color:#f59e0b;font-weight:700">P1:</span> Port Spanish smartEndpointingPlan + transcriptionEndpointingPlan to English config. Spanish already has better settings.</div>
<div class="kanban-item"><span style="color:#f59e0b;font-weight:700">P1:</span> A/B test with smartDenoisingPlan disabled. Record raw audio with and without to compare spectrograms.</div>
<div class="kanban-item"><span style="color:#f59e0b;font-weight:700">P1:</span> Add medical keyterms to keyterms.json — drug names, conditions, procedure terms relevant to primary care + cardiology.</div>
<div class="kanban-item"><span style="color:#06b6d4;font-weight:700">P2:</span> Record raw audio at VAPI handoff point to check for 200ms clipping or codec mismatches.</div>
<div class="kanban-item"><span style="color:#06b6d4;font-weight:700">P2:</span> Test endpointing interaction with Flux eotThreshold — they may conflict (Flux expects to handle turn detection itself).</div>
<div class="kanban-item"><span style="color:#06b6d4;font-weight:700">P2:</span> Relax stopSpeakingPlan to numWords=3, voiceSeconds=0.4 to reduce interruption rate → less audio overlap.</div>
</div>

<h3 style="font-size:12px;font-weight:700;color:#665c78;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px">🔴 Tier 1 — Almost Certainly Worth Investigating</h3>
<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:24px">
<div class="kanban-item"><span style="color:#ef4444;font-weight:600">1. Model Version Silent Upgrade</span><br><span style="color:#998eb5;font-size:12px">Deepgram pushes updates without pinning versions. Nova-2 had a <strong>known bug with missing words/phrases</strong> (patched Jan 2024). Nova-3 and Flux are entirely different architectures.</span><br><span style="color:#22c55e;font-size:11px;font-weight:600">✅ FIX:</span> <span style="color:#6ee7b7;font-size:11px">Pin model version explicitly: <code style="background:rgba(6,182,212,0.15);padding:1px 4px;border-radius:3px;font-size:10px">model=nova-2-general</code> not just <code style="background:rgba(6,182,212,0.15);padding:1px 4px;border-radius:3px;font-size:10px">model=nova-2</code>. Test Nova-3 and Flux side-by-side on real call audio. Contact Deepgram support to get your exact model version hash.</span><br><span style="font-size:10px">📎 <a href="https://deepgram.com/changelog/updated-nova-2-model-english-pre-recorded-improved-word-recognition" target="_blank" style="color:#06b6d4;text-decoration:none;border-bottom:1px solid rgba(6,182,212,0.3)">Deepgram Changelog: Nova-2 Missing Words Fix</a> · <a href="https://developers.deepgram.com/docs/model" target="_blank" style="color:#06b6d4;text-decoration:none;border-bottom:1px solid rgba(6,182,212,0.3)">Model Options Docs</a></span></div>
<div class="kanban-item"><span style="color:#ef4444;font-weight:600">2. Encoding / Sample Rate Mismatch</span><br><span style="color:#998eb5;font-size:12px">Phone audio = mulaw 8kHz. If Deepgram expects linear16 @ 16kHz, it silently produces garbage — no error thrown. <strong>#1 cause of "missing obvious words."</strong></span><br><span style="color:#22c55e;font-size:11px;font-weight:600">✅ FIX:</span> <span style="color:#6ee7b7;font-size:11px">Explicitly set <code style="background:rgba(6,182,212,0.15);padding:1px 4px;border-radius:3px;font-size:10px">encoding=mulaw&sample_rate=8000</code> for phone calls. Log the actual audio format at the WS connection point. Record a raw audio dump and verify it plays correctly at the configured sample rate.</span><br><span style="font-size:10px">📎 <a href="https://developers.deepgram.com/docs/sample-rate" target="_blank" style="color:#06b6d4;text-decoration:none;border-bottom:1px solid rgba(6,182,212,0.3)">Sample Rate Docs</a> · <a href="https://dev.to/callstacktech/integrating-deepgram-for-real-time-asr-in-voice-agent-pipelines-a-developers-journey-1b43" target="_blank" style="color:#06b6d4;text-decoration:none;border-bottom:1px solid rgba(6,182,212,0.3)">Mulaw Mismatch Walkthrough</a></span></div>
<div class="kanban-item"><span style="color:#ef4444;font-weight:600">3. Streaming Context Starvation</span><br><span style="color:#998eb5;font-size:12px">Streaming has <strong>5-20x less context than batch</strong>. Under load, medical terms, phone numbers, and addresses fail at higher rates.</span><br><span style="color:#22c55e;font-size:11px;font-weight:600">✅ FIX:</span> <span style="color:#6ee7b7;font-size:11px">Use <code style="background:rgba(6,182,212,0.15);padding:1px 4px;border-radius:3px;font-size:10px">keywords</code> / <code style="background:rgba(6,182,212,0.15);padding:1px 4px;border-radius:3px;font-size:10px">keyterm</code> boosting for medical terms, doctor names, and drug names. Build a domain keyword list. Also try increasing <code style="background:rgba(6,182,212,0.15);padding:1px 4px;border-radius:3px;font-size:10px">utterance_end_ms</code> to give more context per segment.</span><br><span style="font-size:10px">📎 <a href="https://deepgram.com/learn/streaming-tts-latency-accuracy-tradeoff-2026" target="_blank" style="color:#06b6d4;text-decoration:none;border-bottom:1px solid rgba(6,182,212,0.3)">Streaming Latency vs Accuracy Tradeoff</a> · <a href="https://deepgram.com/learn/speech-recognition-accuracy-production-metrics" target="_blank" style="color:#06b6d4;text-decoration:none;border-bottom:1px solid rgba(6,182,212,0.3)">Production Accuracy Metrics</a></span></div>
<div class="kanban-item"><span style="color:#ef4444;font-weight:600">4. ElevenLabs Echo Bleed → STT</span><br><span style="color:#998eb5;font-size:12px">TTS output leaking back to mic. ElevenLabs changed audio spectral profiles (v1→v2→v2.5→v3), breaking previously-working echo cancellation.</span><br><span style="color:#22c55e;font-size:11px;font-weight:600">✅ FIX:</span> <span style="color:#6ee7b7;font-size:11px">Mute the STT mic stream while TTS is playing (server-side gate). If using separate channels, verify channel isolation. Test by recording the raw inbound audio during agent speech — if you hear the agent voice, echo cancellation is broken. Pin ElevenLabs model version.</span><br><span style="font-size:10px">📎 <a href="https://arunbaby.com/ai-agents/0017-voice-agent-architecture/" target="_blank" style="color:#06b6d4;text-decoration:none;border-bottom:1px solid rgba(6,182,212,0.3)">Voice Agent Architecture: Echo Cancellation</a> · <a href="https://elevenlabs.io/docs/creative-platform/troubleshooting" target="_blank" style="color:#06b6d4;text-decoration:none;border-bottom:1px solid rgba(6,182,212,0.3)">ElevenLabs Troubleshooting</a></span></div>
<div class="kanban-item"><span style="color:#ef4444;font-weight:600">5. Endpointing / VAD Too Aggressive</span><br><span style="color:#998eb5;font-size:12px">Low endpointing ms cuts audio at pauses. Words at segment boundaries get dropped. Especially bad when patients pause to think of drug names.</span><br><span style="color:#22c55e;font-size:11px;font-weight:600">✅ FIX:</span> <span style="color:#6ee7b7;font-size:11px">Increase <code style="background:rgba(6,182,212,0.15);padding:1px 4px;border-radius:3px;font-size:10px">endpointing=300</code> or higher (default is 10ms on some SDKs!). Set <code style="background:rgba(6,182,212,0.15);padding:1px 4px;border-radius:3px;font-size:10px">utterance_end_ms=1200</code>. Use <code style="background:rgba(6,182,212,0.15);padding:1px 4px;border-radius:3px;font-size:10px">vad_events=true</code> to monitor when cuts happen. Compare transcript with/without endpointing on same audio.</span><br><span style="font-size:10px">📎 <a href="https://developers.deepgram.com/docs/understanding-end-of-speech-detection" target="_blank" style="color:#06b6d4;text-decoration:none;border-bottom:1px solid rgba(6,182,212,0.3)">End of Speech Detection Docs</a> · <a href="https://developers.deepgram.com/docs/endpointing" target="_blank" style="color:#06b6d4;text-decoration:none;border-bottom:1px solid rgba(6,182,212,0.3)">Endpointing Reference</a></span></div>
</div>

<h3 style="font-size:12px;font-weight:700;color:#665c78;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px">🟡 Tier 2 — Very Plausible</h3>
<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:24px">
<div class="kanban-item"><span style="color:#f59e0b;font-weight:600">6. smart_format Eating Words</span><br><span style="color:#998eb5;font-size:12px">Post-processing deletes words it thinks are noise. Medical terminology gets mangled by formatting heuristics.</span><br><span style="color:#22c55e;font-size:11px;font-weight:600">✅ FIX:</span> <span style="color:#6ee7b7;font-size:11px">A/B test with <code style="background:rgba(6,182,212,0.15);padding:1px 4px;border-radius:3px;font-size:10px">smart_format=false</code>. Compare raw transcript vs formatted. If words reappear, smart_format is the culprit. Do your own post-processing for medical terms instead.</span><br><span style="font-size:10px">📎 <a href="https://developers.deepgram.com/docs/smart-format" target="_blank" style="color:#06b6d4;text-decoration:none;border-bottom:1px solid rgba(6,182,212,0.3)">Smart Format Docs</a></span></div>
<div class="kanban-item"><span style="color:#f59e0b;font-weight:600">7. VAPI Infrastructure Changes</span><br><span style="color:#998eb5;font-size:12px">VAPI was caught <strong>clipping the first 200ms of every utterance</strong> (per Hamming AI). Changed audio routing, resampling, or default model.</span><br><span style="color:#22c55e;font-size:11px;font-weight:600">✅ FIX:</span> <span style="color:#6ee7b7;font-size:11px">Bypass VAPI and send audio directly to Deepgram WS as a test. If accuracy improves, VAPI is the bottleneck. Check VAPI changelog and your VAPI SDK version. Consider switching to direct Deepgram integration or Livekit.</span><br><span style="font-size:10px">📎 <a href="https://hamming.ai/resources/best-voice-agent-stack" target="_blank" style="color:#06b6d4;text-decoration:none;border-bottom:1px solid rgba(6,182,212,0.3)">Hamming AI: "STT was clipping first 200ms"</a> · <a href="https://docs.vapi.ai/providers/voice/elevenlabs" target="_blank" style="color:#06b6d4;text-decoration:none;border-bottom:1px solid rgba(6,182,212,0.3)">VAPI ElevenLabs Integration</a></span></div>
<div class="kanban-item"><span style="color:#f59e0b;font-weight:600">8. Telephony Provider Codec Change</span><br><span style="color:#998eb5;font-size:12px">Twilio/Vonage/Telnyx silently changing codec defaults (Opus vs mulaw vs G.722). Audio hitting Deepgram changed without you touching anything.</span><br><span style="color:#22c55e;font-size:11px;font-weight:600">✅ FIX:</span> <span style="color:#6ee7b7;font-size:11px">Check your telephony provider's media stream docs for codec changes. Explicitly set codec in your TwiML/config. Log the Content-Type / encoding header on inbound streams. Compare against what Deepgram expects.</span><br><span style="font-size:10px">📎 <a href="https://softcery.com/lab/ai-voice-agents-real-time-vs-turn-based-tts-stt-architecture" target="_blank" style="color:#06b6d4;text-decoration:none;border-bottom:1px solid rgba(6,182,212,0.3)">PSTN 8kHz Degrades STT Accuracy</a> · <a href="https://developers.deepgram.com/docs/on-premise-twilio-integration" target="_blank" style="color:#06b6d4;text-decoration:none;border-bottom:1px solid rgba(6,182,212,0.3)">Twilio-Deepgram Integration</a></span></div>
<div class="kanban-item"><span style="color:#f59e0b;font-weight:600">9. Population Drift</span><br><span style="color:#998eb5;font-size:12px">Patient demographics shifted — more non-native speakers, different accents, older callers. Model accuracy drops for YOUR traffic even if benchmarks improved.</span><br><span style="color:#22c55e;font-size:11px;font-weight:600">✅ FIX:</span> <span style="color:#6ee7b7;font-size:11px">Segment your WER by caller demographics. Use <code style="background:rgba(6,182,212,0.15);padding:1px 4px;border-radius:3px;font-size:10px">language=en-US</code> explicitly. Test Nova-3 multilingual mode which handles accents/code-switching better. Consider Deepgram custom training if a specific population is dominant.</span><br><span style="font-size:10px">📎 <a href="https://deepgram.com/learn/transcription-quality-monitoring-production" target="_blank" style="color:#06b6d4;text-decoration:none;border-bottom:1px solid rgba(6,182,212,0.3)">Transcription Quality Monitoring: Population Drift</a></span></div>
<div class="kanban-item"><span style="color:#f59e0b;font-weight:600">10. Noise Reduction Paradox</span><br><span style="color:#998eb5;font-size:12px">Adding noise reduction <strong>often degrades STT accuracy</strong> (Deepgram's own warning). Removes spectral info the model needs.</span><br><span style="color:#22c55e;font-size:11px;font-weight:600">✅ FIX:</span> <span style="color:#6ee7b7;font-size:11px">Disable ALL audio preprocessing (noise gates, filters, AGC, Krisp, etc.) and test raw audio. If accuracy improves, re-enable one filter at a time to find the offender. Send raw, unprocessed audio to Deepgram — they handle noise internally.</span><br><span style="font-size:10px">📎 <a href="https://deepgram.com/learn/the-noise-reduction-paradox-why-it-may-hurt-speech-to-text-accuracy" target="_blank" style="color:#06b6d4;text-decoration:none;border-bottom:1px solid rgba(6,182,212,0.3)">The Noise Reduction Paradox (Deepgram)</a></span></div>
</div>

<h3 style="font-size:12px;font-weight:700;color:#665c78;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px">🟠 Tier 3 — Less Obvious But Real</h3>
<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:24px">
<div class="kanban-item"><span style="color:#fb923c;font-weight:600">11. Interim vs Final Result Confusion</span><br><span style="color:#998eb5;font-size:12px">If app reads interim_results as final, you get incomplete transcripts. Interims are partial and get revised.</span><br><span style="color:#22c55e;font-size:11px;font-weight:600">✅ FIX:</span> <span style="color:#6ee7b7;font-size:11px">Check if your code filters on <code style="background:rgba(6,182,212,0.15);padding:1px 4px;border-radius:3px;font-size:10px">is_final=true</code> before using transcripts. Log both interim and final results with timestamps. If you need low latency, use interims for display but finals for LLM input.</span><br><span style="font-size:10px">📎 <a href="https://developers.deepgram.com/docs/understand-endpointing-interim-results" target="_blank" style="color:#06b6d4;text-decoration:none;border-bottom:1px solid rgba(6,182,212,0.3)">Configure Endpointing & Interim Results</a></span></div>
<div class="kanban-item"><span style="color:#fb923c;font-weight:600">12. WebSocket Drops / Reconnections</span><br><span style="color:#998eb5;font-size:12px">WS drops mid-utterance → audio during reconnection gap is lost. Happens silently under load.</span><br><span style="color:#22c55e;font-size:11px;font-weight:600">✅ FIX:</span> <span style="color:#6ee7b7;font-size:11px">Add WS close/error event logging with timestamps. Buffer audio locally during reconnection and replay after reconnect. Monitor Deepgram WS close codes (1006 = abnormal). Set up alerting on WS disconnect rate.</span><br><span style="font-size:10px">📎 <a href="https://github.com/orgs/deepgram/discussions/897" target="_blank" style="color:#06b6d4;text-decoration:none;border-bottom:1px solid rgba(6,182,212,0.3)">Deepgram Discussion: 1006 Connection Drops</a></span></div>
<div class="kanban-item"><span style="color:#fb923c;font-weight:600">13. Multichannel Misconfiguration</span><br><span style="color:#998eb5;font-size:12px">multichannel=true on mono audio (or vice versa) = Deepgram splits/merges channels incorrectly.</span><br><span style="color:#22c55e;font-size:11px;font-weight:600">✅ FIX:</span> <span style="color:#6ee7b7;font-size:11px">Verify actual channel count of inbound audio matches <code style="background:rgba(6,182,212,0.15);padding:1px 4px;border-radius:3px;font-size:10px">channels</code> and <code style="background:rgba(6,182,212,0.15);padding:1px 4px;border-radius:3px;font-size:10px">multichannel</code> params. Phone calls are typically mono — set <code style="background:rgba(6,182,212,0.15);padding:1px 4px;border-radius:3px;font-size:10px">channels=1&multichannel=false</code> unless using Twilio's forked media.</span><br><span style="font-size:10px">📎 <a href="https://github.com/orgs/deepgram/discussions/695" target="_blank" style="color:#06b6d4;text-decoration:none;border-bottom:1px solid rgba(6,182,212,0.3)">Multichannel mulaw Encoding Discussion</a></span></div>
<div class="kanban-item"><span style="color:#fb923c;font-weight:600">14. Deepgram SDK Version</span><br><span style="color:#998eb5;font-size:12px">Old SDK with WS protocol bugs, or auto-updated to incompatible version. Check package-lock.json.</span><br><span style="color:#22c55e;font-size:11px;font-weight:600">✅ FIX:</span> <span style="color:#6ee7b7;font-size:11px">Check <code style="background:rgba(6,182,212,0.15);padding:1px 4px;border-radius:3px;font-size:10px">npm ls @deepgram/sdk</code> and compare to latest. Read the SDK changelog for breaking changes. Pin the version in package.json. Test with both your current and latest SDK on same audio.</span><br><span style="font-size:10px">📎 <a href="https://github.com/deepgram/deepgram-js-sdk/releases" target="_blank" style="color:#06b6d4;text-decoration:none;border-bottom:1px solid rgba(6,182,212,0.3)">Deepgram JS SDK Releases</a> · <a href="https://github.com/deepgram/deepgram-python-sdk/releases" target="_blank" style="color:#06b6d4;text-decoration:none;border-bottom:1px solid rgba(6,182,212,0.3)">Python SDK Releases</a></span></div>
<div class="kanban-item"><span style="color:#fb923c;font-weight:600">15. Filler Words Setting</span><br><span style="color:#998eb5;font-size:12px">filler_words=true (now recommended) changes word boundary behavior. Toggling this changes model output.</span><br><span style="color:#22c55e;font-size:11px;font-weight:600">✅ FIX:</span> <span style="color:#6ee7b7;font-size:11px">Try <code style="background:rgba(6,182,212,0.15);padding:1px 4px;border-radius:3px;font-size:10px">filler_words=true</code> (Deepgram now recommends for voice agents — improves turn detection accuracy). If already true, try false. Compare outputs. Filler words affect how the model handles word boundaries.</span><br><span style="font-size:10px">📎 <a href="https://docs.livekit.io/reference/python/livekit/plugins/deepgram/index.html" target="_blank" style="color:#06b6d4;text-decoration:none;border-bottom:1px solid rgba(6,182,212,0.3)">Livekit Deepgram Plugin: filler_words default</a></span></div>
<div class="kanban-item"><span style="color:#fb923c;font-weight:600">16. Rate Limiting / Throttling</span><br><span style="color:#998eb5;font-size:12px">Hitting Deepgram rate limits → audio buffer overflow → dropped frames. More calls = more throttling.</span><br><span style="color:#22c55e;font-size:11px;font-weight:600">✅ FIX:</span> <span style="color:#6ee7b7;font-size:11px">Check Deepgram dashboard for 429 errors and concurrency limits. Monitor response headers for rate limit info. If hitting limits, contact Deepgram to increase your tier or implement connection pooling with backoff.</span><br><span style="font-size:10px">📎 <a href="https://developers.deepgram.com/docs/rate-limits" target="_blank" style="color:#06b6d4;text-decoration:none;border-bottom:1px solid rgba(6,182,212,0.3)">Deepgram Rate Limits</a></span></div>
<div class="kanban-item"><span style="color:#fb923c;font-weight:600">17. Audio Bitrate / Compression</span><br><span style="color:#998eb5;font-size:12px">Any new compression, resampling, or format conversion in the pipeline — even "transparent" ones.</span><br><span style="color:#22c55e;font-size:11px;font-weight:600">✅ FIX:</span> <span style="color:#6ee7b7;font-size:11px">Audit every hop in the audio pipeline for format conversions. Record raw audio at each stage and compare spectrograms. Deepgram prefers raw, uncompressed audio. If converting mp3→wav improves results, intermediate compression is the issue.</span><br><span style="font-size:10px">📎 <a href="https://github.com/orgs/deepgram/discussions/474" target="_blank" style="color:#06b6d4;text-decoration:none;border-bottom:1px solid rgba(6,182,212,0.3)">Nova-2: mp3→wav Reduces Missed Words</a> · <a href="https://stackoverflow.com/questions/37018868/wav-vs-opus-speech-to-text-transcript-quality" target="_blank" style="color:#06b6d4;text-decoration:none;border-bottom:1px solid rgba(6,182,212,0.3)">WAV vs Opus STT Quality</a></span></div>
<div class="kanban-item"><span style="color:#fb923c;font-weight:600">18. Keyword Boosting Regression</span><br><span style="color:#998eb5;font-size:12px">If keywords for medical terms were removed/changed, or Deepgram updated the boosting feature.</span><br><span style="color:#22c55e;font-size:11px;font-weight:600">✅ FIX:</span> <span style="color:#6ee7b7;font-size:11px">Rebuild your keyword list with common medical terms, drug names, and doctor names. Use <code style="background:rgba(6,182,212,0.15);padding:1px 4px;border-radius:3px;font-size:10px">keywords=["metformin:2","amoxicillin:2"]</code> with intensity boosting. On Nova-3, use the new <code style="background:rgba(6,182,212,0.15);padding:1px 4px;border-radius:3px;font-size:10px">keyterm</code> prompting feature instead.</span><br><span style="font-size:10px">📎 <a href="https://developers.deepgram.com/docs/keywords" target="_blank" style="color:#06b6d4;text-decoration:none;border-bottom:1px solid rgba(6,182,212,0.3)">Keywords Boosting Docs</a> · <a href="https://developers.deepgram.com/docs/keyterm" target="_blank" style="color:#06b6d4;text-decoration:none;border-bottom:1px solid rgba(6,182,212,0.3)">Keyterm Prompting (Nova-3)</a> · <a href="https://docs.vapi.ai/customization/custom-keywords" target="_blank" style="color:#06b6d4;text-decoration:none;border-bottom:1px solid rgba(6,182,212,0.3)">VAPI Custom Keywords</a></span></div>
</div>

<h3 style="font-size:12px;font-weight:700;color:#665c78;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px">❓ Questions — Answered from Codebase</h3>
<div style="display:flex;flex-direction:column;gap:6px;margin-bottom:24px" id="sttQuestions">
<div class="kanban-item" style="display:flex;align-items:flex-start;gap:8px"><span style="color:#22c55e;font-weight:700;min-width:24px">Q1</span><span style="color:#d4c4f0;font-size:13px"><strong>Model:</strong> Default English = <code style="background:rgba(6,182,212,0.15);padding:1px 4px;border-radius:3px;font-size:11px">flux-general-en</code> with eotThreshold=0.7, eotTimeoutMs=5000. Spanish/multilingual = <code style="background:rgba(6,182,212,0.15);padding:1px 4px;border-radius:3px;font-size:11px">nova-3</code> with language=multi. Azure fallback for both. Models are explicitly pinned in code.</span></div>
<div class="kanban-item" style="display:flex;align-items:flex-start;gap:8px"><span style="color:#f59e0b;font-weight:700;min-width:24px">Q2</span><span style="color:#d4c4f0;font-size:13px"><strong>Encoding:</strong> ⚠️ NOT explicitly set in transcriber config. No encoding, sample_rate, or channels params passed. VAPI handles the audio pipe from Twilio → Deepgram. This is a potential issue — if VAPI or Twilio changed codec defaults, Deepgram wouldn't know.</span></div>
<div class="kanban-item" style="display:flex;align-items:flex-start;gap:8px"><span style="color:#22c55e;font-weight:700;min-width:24px">Q3</span><span style="color:#d4c4f0;font-size:13px"><strong>Orchestrator:</strong> VAPI (api.vapi.ai). Custom voice-agent backend handles webhooks + tool calls. No Deepgram SDK — everything goes through VAPI's API. VAPI version not pinned (uses their hosted API).</span></div>
<div class="kanban-item" style="display:flex;align-items:flex-start;gap:8px"><span style="color:#22c55e;font-weight:700;min-width:24px">Q4</span><span style="color:#d4c4f0;font-size:13px"><strong>Telephony:</strong> Twilio (TWILIO_ACCOUNT_SID + TWILIO_AUTH_TOKEN in config). Phone numbers passed via twilioPhoneNumber in VAPI payload. No codec explicitly set — relies on Twilio/VAPI defaults.</span></div>
<div class="kanban-item" style="display:flex;align-items:flex-start;gap:8px"><span style="color:#22c55e;font-weight:700;min-width:24px">Q5</span><span style="color:#d4c4f0;font-size:13px"><strong>Echo cancellation:</strong> Yes — <code style="background:rgba(6,182,212,0.15);padding:1px 4px;border-radius:3px;font-size:11px">backgroundSpeechDenoisingPlan.smartDenoisingPlan.enabled=true</code> (VAPI's built-in). <strong>NOT using ElevenLabs</strong> — TTS is <strong>Cartesia sonic-3</strong> (voiceId: f9836c6e) at speed 0.8. This is a big finding — original investigation assumed ElevenLabs.</span></div>
<div class="kanban-item" style="display:flex;align-items:flex-start;gap:8px"><span style="color:#22c55e;font-weight:700;min-width:24px">Q6</span><span style="color:#d4c4f0;font-size:13px"><strong>Streaming params:</strong> endpointing=10 (very aggressive!), smartFormat=false, numerals=false, mipOptOut=true. Comment in code says "use 300 if missing some transcriptions." Spanish config adds: smartEndpointingPlan (livekit, 300+300/(1+exp(-10*(x-0.5)))), transcriptionEndpointingPlan (punctuation=0.3, noPunctuation=0.6, number=0.5). stopSpeakingPlan: numWords=2, voiceSeconds=0.2.</span></div>
<div class="kanban-item" style="display:flex;align-items:flex-start;gap:8px"><span style="color:#f59e0b;font-weight:700;min-width:24px">Q7</span><span style="color:#d4c4f0;font-size:13px"><strong>Pattern:</strong> 🔍 Need Alex's input. Code supports English + Spanish, outbound (scheduling/reminder) + inbound. Multi-client (000, 001, 002). Degradation pattern unknown from code alone.</span></div>
<div class="kanban-item" style="display:flex;align-items:flex-start;gap:8px"><span style="color:#f59e0b;font-weight:700;min-width:24px">Q8</span><span style="color:#d4c4f0;font-size:13px"><strong>Audio samples:</strong> 🔍 Need Alex's input. Recordings are enabled (GCP bucket), paths follow /{agent_type}/{call_id}/recordings. Old recordings should exist for comparison. Langfuse observability enabled in non-prod.</span></div>

<div class="panel-sub">Patient data architecture • FHIR API ingestion • data point tables</div>
<style>.hh h1{font-size:20px;font-weight:700;color:#fff;margin:32px 0 16px;padding-bottom:10px;border-bottom:2px solid rgba(232,121,249,0.3)}.hh h1:first-child{display:none}.hh h2{font-size:16px;font-weight:700;color:#fff;margin:28px 0 12px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,0.08)}.hh h3{font-size:14px;font-weight:700;color:#e879f9;margin:20px 0 8px}.hh h4{font-size:13px;font-weight:600;color:#c084fc;margin:16px 0 6px}.hh table{border-collapse:collapse;width:100%;margin:12px 0}.hh th,.hh td{padding:6px 10px;border:1px solid rgba(255,255,255,0.08);font-size:12px;text-align:left}.hh th{background:rgba(255,255,255,0.04);color:#fff;font-weight:600}.hh code{background:rgba(232,121,249,0.1);padding:1px 5px;border-radius:3px;font-size:12px;color:#e879f9}.hh pre{background:#1a1525;padding:16px;border-radius:8px;overflow-x:auto;font-size:12px;border:1px solid rgba(255,255,255,0.06)}.hh pre code{background:none;padding:0;color:#d4c4f0}.hh hr{border:none;border-top:1px solid rgba(255,255,255,0.08);margin:24px 0}.hh ul,.hh li{color:#998eb5;font-size:13px;margin:4px 0}.hh p{margin:8px 0;color:#d4c4f0;font-size:13px;line-height:1.7}.hh strong{color:#fff}</style>
<div class="hh"><h1>Home Health App — Schema Design</h1>
<h1>Introduction</h1>
<p>Home health care works in <strong>episodes</strong> — a patient gets assigned a care plan (typically 30 days), and nurses visit them at home throughout that period. During each visit, they record vitals, assess the patient's ability to perform daily activities, track visit counts, and more.</p>
<p>Our app connects to <strong>Epic</strong> (the hospital's electronic health record system) through their FHIR APIs. Think of these as endpoints that return raw clinical data — things like observations, encounters, care plans, and documents. We call about 30 of these APIs per patient, on a recurring schedule (roughly every 5-15 days).</p>
<p>The problem is that what Epic gives us and what the frontend needs to display are two very different things.</p>
<h3>What's a Data Point?</h3>
<p>A <strong>data point</strong> is what the clinical user actually sees on screen. It's a clean, structured table — like a patient's vitals over time, or their LUPA visit tracking summary.</p>
<p>A data point might seem simple on the frontend, but behind the scenes it could be assembled from multiple API calls. For example, to build one row of LUPA tracking data, we need to call four separate APIs and combine the results.</p>
<h3>What's an API Response?</h3>
<p>Every time we call an Epic API, we get back a raw FHIR resource (JSON). We store this exactly as-is in a database table called <code>api_response</code>. This is our audit trail — if a number ever looks wrong, we can trace it back to the raw data Epic gave us.</p>
<h3>The Many-to-Many Problem</h3>
<p>This is the core design challenge:</p>
<ul>
<li>
<p><strong>One data point can need multiple APIs.</strong> LUPA tracking needs data from Encounter.Search, CarePlan.Read, EpisodeOfCare.Search, and DocumentReference.Search — four different APIs feeding one table row.</p>
</li>
<li>
<p><strong>One API can feed multiple data points.</strong> Encounter.Search returns encounter data that feeds both the LUPA tracker and the hospital admissions view.</p>
</li>
</ul>
<p>The rest of this document describes how we handle this.</p>
<hr />
<h1>General Design</h1>
<h3>The Frontend Is Disconnected from the EHR</h3>
<p>This is important: the frontend never talks to Epic. It only reads from our data point tables. All the complexity of calling APIs, transforming data, and handling partial updates happens in background jobs. The frontend just reloads clean, pre-processed data.</p>
<h3>Flow</h3>
<p>Data moves through three layers: <strong>EHR → Processors → Data Points</strong>.</p>
<p>First, we call all FHIR APIs for a patient and store each raw response in an <code>api_response</code> table as JSONB. This is append-only — our audit trail. Then, each data point type has a <strong>processor</strong> that receives the relevant API responses, extracts and transforms the data, and writes to its target table. We call all APIs first, then run processors — so each processor has the full picture before writing. One API response can be routed to multiple processors.</p>
<p>The frontend reads from the data point tables — one per data point type. This is what clinical staff see.</p>
<h3>Jobs</h3>
<p>Three recurring jobs keep the system current:</p>
<p><strong>1. Patient Ingestion</strong> — Runs daily. Pulls the current list of patients with active episodes from Epic. New patients get added to our system. This is how we know who to fetch data for.</p>
<p><strong>2. Patient Pruning</strong> — Runs daily. Checks for patients whose episodes have ended (discharged, transferred, deceased). Marks them inactive so we stop calling APIs for them. Keeps the active patient list lean.</p>
<p><strong>3. Data Refresh</strong> — Runs on a schedule (every 5-15 days). Takes the active patient list, calls all relevant FHIR APIs for each patient, stores the raw responses, and runs the processors. This is the main ingestion cycle described in the flow above.</p>
<hr />
<h1>Data Design</h1>
<p>We use <strong>Prisma</strong> as our ORM and <strong>Postgres</strong> as our database.</p>
<h3>Why This Needs Thought</h3>
<p>The naive approach would be to just save whatever the APIs give us and query it directly. But that doesn't work here because:</p>
<ul>
<li><strong>The frontend needs clean, typed data.</strong> A vitals table with real columns (bp_systolic, pulse, etc.) — not raw FHIR JSON.</li>
<li><strong>Multiple APIs feed one data point.</strong> LUPA tracking needs four different API calls combined into one row. We need a place to merge them.</li>
<li><strong>APIs return data at different times.</strong> Vitals might come back today, but hemoglobin from a separate labs API comes back next week. The row needs to handle partial updates.</li>
<li><strong>Doctors need to know where data came from.</strong> Clinical staff need to trust the numbers they're seeing. If a value looks wrong, they need to trace it back to the original source — which API call produced it, and what the raw response looked like. This is a compliance and trust requirement, not just a nice-to-have.</li>
</ul>
<h3>Two Options</h3>
<p><strong>Option A: One universal table</strong> — Every extracted value goes into a single <code>data_unit</code> table as individual rows (e.g. one row for "bp_systolic = 120", another for "pulse = 72"). Full traceability since every row links to its exact API call. But querying is complex, Prisma can't type-check it, and the frontend needs SQL views to reshape the data.</p>
<p><strong>Option B: One table per data point</strong> — Each data point type gets its own Prisma table with real columns (<code>patient_vital</code>, <code>patient_lupa</code>, etc.). Simple to query, full ORM support, each table shaped exactly for its frontend component. We keep a simple <code>api_response_id</code> on each row pointing to the last API call that touched it. For deeper tracing, we fall back to the raw JSONB in <code>api_response</code>.</p>
<p><strong>We go with Option B.</strong> It's simpler, plays nicely with Prisma, and the traceability tradeoff is acceptable — the raw API responses are always there if we need to dig deeper.</p>
<hr />
<h1>In-Depth Design</h1>
<p>Each data point section walks through the full story: what the raw API gives us, what the processor does with it, and what the final table looks like.</p>
<h2>Vitals</h2>
<h3>What the API Returns</h3>
<p>A nurse takes vitals at each home visit. When we call <code>Observation.Search(VitalSigns)</code>, Epic returns a FHIR bundle with separate Observation resources — one for blood pressure, one for pulse, one for O2 saturation. Even though they were all measured at the same time, they come back as individual resources.</p>
<p>Hemoglobin comes from a different API entirely — <code>Observation.Search(Labs)</code> — and might not return until days after the visit.</p>
<h3>What the Processor Does</h3>
<p>The VitalProcessor receives both API responses and:</p>
<ol>
<li>Parses each Observation resource from the vitals bundle</li>
<li>Groups them by timestamp (occurred_at)</li>
<li>Extracts the values — BP splits into systolic and diastolic, pulse and O2 are straightforward</li>
<li>UPSERTs into <code>patient_vital</code> on (patient_id, episode_id, occurred_at)</li>
<li>Only sets the columns it has data for — leaves the rest untouched</li>
</ol>
<p>When the labs API comes back later with hemoglobin for the same timestamp, the processor UPSERTs again — filling in the hemoglobin column on the existing row without touching the other values.</p>
<h3>The Table</h3>
<p><strong><code>patient_vital</code></strong> — one row per visit.</p>

<hr />
<h2>LUPA Tracking</h2>
<h3>What It Is</h3>
<p>LUPA (Low Utilization Payment Adjustment) is a Medicare penalty. If a patient doesn't get enough home health visits during an episode, the agency gets paid significantly less. Clinical staff need to see at a glance: how many visits have happened, how many are planned, and whether they're on track.</p>
<h3>What the APIs Return</h3>
<p>No single API gives us a complete LUPA picture. We need four:</p>
<ul>
<li><strong>Encounter.Search(HH)</strong> — returns a list of home health encounters. We count the ones with status = finished to get visits completed. This is a derived number, not a field Epic hands us.</li>
<li><strong>CarePlan.Read</strong> — returns the care plan with the total planned visits and the LUPA threshold.</li>
<li><strong>EpisodeOfCare.Search</strong> — returns the episode details including PDGM period and how many episodes the patient has completed.</li>
</ul>
<h3>What the Processor Does</h3>
<p>The LupaProcessor receives all three API responses and:</p>
<ol>
<li>Counts finished home health encounters → <code>visits_completed</code></li>
<li>Extracts planned visits and threshold from the care plan → <code>visits_scheduled</code>, <code>threshold</code></li>
<li>Extracts PDGM and episode count from EpisodeOfCare → <code>pdgm</code>, <code>episodes_completed</code></li>
<li>UPSERTs everything into one row on (patient_id, episode_id)</li>
</ol>
<p>This runs every cycle. The row just keeps getting updated with the latest numbers.</p>

async function sbGet(table){const r=await fetch(SB_URL+'/rest/v1/'+table+'?order=id',{headers:sbHeaders});return r.ok?r.json():[];}
async function sbInsert(table,data){return fetch(SB_URL+'/rest/v1/'+table,{method:'POST',headers:{...sbHeaders,'Prefer':'return=representation'},body:JSON.stringify(data)}).then(r=>r.json());}
async function sbDelete(table,id){return fetch(SB_URL+'/rest/v1/'+table+'?id=eq.'+id,{method:'DELETE',headers:sbHeaders});}

async function syncFromSupabase(){
  try{
    const [cal,notes,dj,bingo]=await Promise.all([sbGet('calendar'),sbGet('notes'),sbGet('dj'),sbGet('bingo')]);
    if(cal.length)localStorage.setItem('mc-cal',JSON.stringify(cal));
    if(notes.length)localStorage.setItem('mc-notes',JSON.stringify(notes.map(n=>({text:n.text,cat:n.cat,time:n.created_at,id:n.id}))));
    if(dj.length){
      djCache=dj.map(d=>({id:d.id,song:d.song,genre:d.genre||'Other',done:d.done||false,bpm:d.bpm||'',quality:d.quality||'',art:d.art||'',size:d.size||'',added_by:d.added_by||'Gatsby',time:d.created_at||'',source:d.source||''}));
    }
    if(bingo.length){const state={};bingo.forEach(b=>{if(b.done)state[b.cell_index]=true});localStorage.setItem('mc-bingo',JSON.stringify(state));}
    var active=document.querySelector('.nav-item.active');
    if(active)switchPanel(active.dataset.id);
  }catch(e){console.log('Supabase sync failed, using localStorage',e)}
}

// Load today/tomorrow events
async function loadTodayTomorrow(){
  try{
    const now=new Date();
    const today=now.toISOString().slice(0,10);
    const tom=new Date(now.getTime()+86400000).toISOString().slice(0,10);
    const r=await fetch(SB_URL+'/rest/v1/calendar?order=date',{headers:sbHeaders});
    const events=r.ok?await r.json():[];
    const todayEv=events.filter(e=>e.date===today);
    const tomEv=events.filter(e=>e.date===tom);
    const el1=document.getElementById('todayEvents');
    const el2=document.getElementById('tomorrowEvents');
    if(el1)el1.innerHTML=todayEv.length?todayEv.map(e=>'<div>• '+e.event+'</div>').join(''):'<div style="color:#665c78">Nothing scheduled</div>';
    if(el2)el2.innerHTML=tomEv.length?tomEv.map(e=>'<div>• '+e.event+'</div>').join(''):'<div style="color:#665c78">Nothing scheduled</div>';
  }catch(e){console.log('Calendar load failed',e)}
}
loadTodayTomorrow();

function switchPanel(id){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.id===id));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  localStorage.setItem('mc-active-tab',id);
  // Update URL bar
  const urlBar=document.querySelector('.url-bar');
  if(urlBar)urlBar.innerHTML='🔒 missioncontrol.app/'+id;
  if(id==='notebook'){loadTasks();renderNotes();renderJournal();}
  if(id==='book')renderBook();
  if(id==='bingo')renderBingo();
  if(id==='crons')renderCrons();
  if(id==='dj'){loadDJProfile();Promise.all([syncDJFromSupabase(),loadDJManifest()]).then(()=>renderDJ());}
}

function switchNB(tab){

// Notes
const catColors={General:'#e879f9',Website:'#22c55e',Book:'#f59e0b',Design:'#a855f7',Revenue:'#22c55e','Alex/Skills':'#22d3ee',Ideas:'#ef4444'};
let noteFilter='All';

function getNotes(){return JSON.parse(localStorage.getItem('mc-notes')||'[]')}
function saveNotes(n){localStorage.setItem('mc-notes',JSON.stringify(n))}

function addNote(){
  const input=document.getElementById('noteInput');
  const text=input.value.trim();if(!text)return;
  const notes=getNotes();
  notes.unshift({text,cat:document.getElementById('noteCat').value,time:new Date().toISOString()});
  saveNotes(notes);input.value='';renderNotes();
}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.activeElement?.id==='noteInput')addNote()});

function deleteNote(i){const n=getNotes();n.splice(i,1);saveNotes(n);renderNotes()}
function toggleNote(i){const n=getNotes();n[i].done=!n[i].done;saveNotes(n);renderNotes()}

function renderNotes(){
  const notes=getNotes();
  const cats=['All',...new Set(notes.map(n=>n.cat))];
  const tabs=document.getElementById('filterTabs');
  if(tabs)tabs.innerHTML=cats.map(c=>`<button class="filter-tab${c===noteFilter?' active':''}" onclick="noteFilter='${c}';renderNotes()">${c}</button>`).join('');
  const list=document.getElementById('notesList');
  if(!list)return;
  const filtered=noteFilter==='All'?notes:notes.filter(n=>n.cat===noteFilter);
  if(!filtered.length){list.innerHTML='<div class="empty-state">📝 No notes yet — start dumping!</div>';return}
  list.innerHTML=filtered.map((n,i)=>{
    const idx=notes.indexOf(n);
    const t=new Date(n.time);
    const isBook=n.cat==='Book';
    const checked=n.done?'checked':'';
    const strike=n.done?'text-decoration:line-through;opacity:0.5':'';
    const cb=isBook?`<input type="checkbox" ${checked} onchange="toggleNote(${idx})" style="cursor:pointer;accent-color:#e879f9;min-width:18px;min-height:18px">`:'';
    const long=n.text.length>120;
    const preview=long?n.text.split(/[.|!|?|\n]/)[0]:'';
    const collapsed=long?'note-collapsed':'';
    const body=long?`<div class="${collapsed}" style="cursor:pointer" onclick="this.classList.toggle('note-collapsed');this.classList.toggle('note-expanded')"><div class="note-short">${preview} <span style="color:#e879f9;font-size:11px">▶</span></div><div class="note-long">${n.text.replace(/\|/g,' · ')} <span style="color:#e879f9;font-size:11px">▲</span></div></div>`:n.text;
    return `<div class="note-item" style="align-items:center">${cb}<span class="note-dot" style="background:${catColors[n.cat]||'#e879f9'}"></span><div class="note-content" style="${strike}">${body}<div class="note-meta">${n.cat} · ${t.toLocaleString()}</div></div><button class="note-del" onclick="deleteNote(${idx})">×</button></div>`;
  }).join('');
}

let journalFilter='All';
async function addJournalEntry(){
  const input=document.getElementById('journalInput');
  const text=input.value.trim();if(!text)return;
  const cat=document.getElementById('journalCat').value;
  input.value='';
  const today=new Date().toISOString().slice(0,10);
  await fetch(SB_URL+'/rest/v1/journal',{method:'POST',headers:{...sbHeaders,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({entry:text,date:today,category:cat})});
  renderJournal();

async function renderJournal(){
  const list=document.getElementById('journalList');
  if(!list)return;
  try{
    const r=await fetch(SB_URL+'/rest/v1/journal?order=created_at.desc&limit=100',{headers:sbHeaders});
    const entries=r.ok?await r.json():[];
    if(!entries.length){list.innerHTML='<div class="empty-state">🎉 No entries yet — tell Alex what you did today!</div>';return}
    const cats=['All',...new Set(entries.map(e=>e.category||'General'))];
    const tabs=document.getElementById('journalFilterTabs');
    if(tabs)tabs.innerHTML=cats.map(c=>`<button class="filter-btn${journalFilter===c?' active':''}" onclick="journalFilter='${c}';renderJournal()">${c}</button>`).join('');
    const filtered=journalFilter==='All'?entries:entries.filter(e=>(e.category||'General')===journalFilter);
    const grouped={};
    filtered.forEach(e=>{const d=e.date||'Unknown';if(!grouped[d])grouped[d]=[];grouped[d].push(e)});
    let html='';
    Object.keys(grouped).sort().reverse().forEach(date=>{
      const d=new Date(date+'T12:00:00');
      const label=d.toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});
      html+=`<div class="card" style="margin-bottom:12px;padding:12px 16px"><h4 style="color:#f59e0b;margin-bottom:8px;font-size:13px">${label}</h4>`;
      grouped[date].forEach(e=>{
        const cc=jCatColors[e.category||'General']||'#e879f9';
        html+=`<div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:6px"><span style="color:#22c55e;font-size:16px">✓</span><span style="font-size:13px;line-height:1.5;color:#d4c4f0">${e.entry}</span><span style="font-size:10px;color:${cc};background:${cc}22;padding:1px 6px;border-radius:4px;white-space:nowrap;margin-left:4px">${e.category||'General'}</span><button onclick="deleteJournal(${e.id})" style="margin-left:auto;background:none;border:none;color:#665c78;cursor:pointer;font-size:12px;opacity:0.5">×</button></div>`;
      });
      html+=`</div>`;
    });
    list.innerHTML=html;
  }catch(e){list.innerHTML='<div class="empty-state">Failed to load journal</div>'}
}

  await fetch(SB_URL+'/rest/v1/journal?id=eq.'+id,{method:'DELETE',headers:{...sbHeaders,'Prefer':'return=minimal'}});

// Tasks (Supabase)
let tasksCache=[];
async function loadTasks(){
  try{
    const r=await fetch(SB_URL+'/rest/v1/tasks?order=created_at.desc',{headers:sbHeaders});
    tasksCache=r.ok?await r.json():[];
  }catch(e){tasksCache=[];}
  renderTasks();
}
async function addTask(){
  const input=document.getElementById('taskInput');
  const title=input.value.trim();if(!title)return;
  const due=document.getElementById('taskDue').value||null;
  const tag=document.getElementById('taskTag').value;
  await sbInsert('tasks',{title,status:'todo',tag,due_date:due});
  input.value='';document.getElementById('taskDue').value='';
  loadTasks();
}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.activeElement?.id==='taskInput')addTask()});
async function advanceTask(id){
  const t=tasksCache.find(x=>x.id===id);if(!t)return;
  const next=t.status==='todo'?'in_progress':t.status==='in_progress'?'done':null;
  if(!next)return;
  const patch={status:next};
  if(next==='done')patch.completed_at=new Date().toISOString();
  await sbUpdate('tasks',id,patch);
  loadTasks();
}
async function revertTask(id){
  const t=tasksCache.find(x=>x.id===id);if(!t)return;
  const prev=t.status==='done'?'in_progress':t.status==='in_progress'?'todo':null;
  if(!prev)return;
  const patch={status:prev};
  if(prev!=='done')patch.completed_at=null;
  await sbUpdate('tasks',id,patch);
  loadTasks();
}
async function deleteTask(id){
  if(!confirm('Delete this task?'))return;
  await sbDelete('tasks',id);
  loadTasks();
}
function renderTasks(){
  const todo=tasksCache.filter(t=>t.status==='todo');
  const prog=tasksCache.filter(t=>t.status==='in_progress');
  const done=tasksCache.filter(t=>t.status==='done');
  // Stats
  const statsEl=document.getElementById('taskStats');
  if(statsEl)statsEl.innerHTML=stat('Todo',todo.length,'queued')+stat('In Progress',prog.length,'active')+stat('Done',done.length,'completed ✅');
  // Daily Todo
  const today=new Date().toISOString().slice(0,10);
  const daily=tasksCache.filter(t=>t.due_date===today&&t.status!=='done');
  const dailyEl=document.getElementById('taskDailyTodo');
  if(dailyEl){
    if(daily.length){
      dailyEl.innerHTML='<div class="card" style="margin-bottom:16px;border-left:3px solid #f59e0b;padding:14px 18px"><div style="font-size:11px;color:#f59e0b;font-weight:600;margin-bottom:8px">📌 TODAY\'S TASKS</div>'+
        daily.map(t=>'<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:13px;color:#d4c4f0"><span style="cursor:pointer" onclick="advanceTask('+t.id+')">○</span> '+t.title+' <span class="tag tag-'+(t.tag||'human')+'">'+(t.tag||'')+'</span></div>').join('')+'</div>';
    } else dailyEl.innerHTML='';
  }
  // Kanban
  const kanban=document.getElementById('taskKanban');
  if(!kanban)return;
  function renderCol(icon,label,items,allowAdvance,allowRevert){
    let html='<div class="kanban-col card"><h4>'+icon+' '+label+' ('+items.length+')</h4>';
    items.forEach(t=>{
      const dueStr=t.due_date?'<div style="font-size:10px;color:#665c78;margin-top:4px">📅 '+t.due_date+'</div>':'';
      const advBtn=allowAdvance?'<span style="cursor:pointer;font-size:14px;margin-right:4px" onclick="advanceTask('+t.id+')" title="Advance">→</span>':'';
      const revBtn=allowRevert?'<span style="cursor:pointer;font-size:14px;margin-right:4px" onclick="revertTask('+t.id+')" title="Move back">←</span>':'';
      const delBtn='<span style="cursor:pointer;font-size:14px;color:#ef4444;opacity:0.5" onclick="deleteTask('+t.id+')" title="Delete">×</span>';
      html+='<div class="kanban-item"><div style="display:flex;justify-content:space-between;align-items:start"><span>'+t.title+'</span><span style="display:flex;gap:2px">'+revBtn+advBtn+delBtn+'</span></div>'+
        (t.tag?'<br><span class="tag tag-'+(t.tag||'human')+'">'+t.tag+'</span>':'')+dueStr+'</div>';
    });
    html+='</div>';return html;
  }
  kanban.innerHTML=renderCol('📋','Todo',todo,true,false)+renderCol('🔄','In Progress',prog,true,true)+renderCol('✅','Done',done,false,true);
}

        const k=ch+'-'+i;
        if(!(k in s)&&!blankTitles.has(t)){s[k]=2;}
      });
    });
    s._init=true;
    localStorage.setItem('mc-book-state',JSON.stringify(s));
  }
  return s;
}
function saveBookState(s){localStorage.setItem('mc-book-state',JSON.stringify(s))}
function getBookDedicated(){return JSON.parse(localStorage.getItem('mc-book-dedicated')||'{}')}
function saveBookDedicated(s){localStorage.setItem('mc-book-dedicated',JSON.stringify(s))}
function cycleBook(ch,i){const s=getBookState();const k=ch+'-'+i;const cur=s[k]||0;s[k]=(cur+1)%4;saveBookState(s);renderBook()}
function toggleDedicated(ev,ch,i){ev.stopPropagation();const d=getBookDedicated();const k=ch+'-'+i;d[k]=!d[k];saveBookDedicated(d);renderBook()}
function renderBook(){
  const grid=document.getElementById('bookGrid');
  const stats=document.getElementById('bookStats');
  if(!grid)return;
  const st=getBookState();
  const ded=getBookDedicated();
  let totalPages=0,ideas=0,written=0,edited=0,dedicated=0;
  bookOrder.forEach(ch=>{totalPages+=bookData[ch].titles.length});
  Object.entries(st).forEach(([k,v])=>{if(k==='_init')return;if(v===1)ideas++;if(v===2)written++;if(v===3)edited++});
  Object.values(ded).forEach(v=>{if(v)dedicated++});
  stats.innerHTML=`${stat('Total Pages',totalPages,'across 27 chapters')}${stat('💡 Ideas',ideas,'')}${stat('✍️ Written',written,'')}${stat('✅ Edited',edited,'')}${stat('📌 Dedicated',dedicated,'')}`;
  const univCh=['4','5','11'];
  let html='';
  bookOrder.forEach(ch=>{
    const d=bookData[ch];
    const isUniv=univCh.includes(ch);
    const label=`<span style="font-weight:700;color:${isUniv?'#f59e0b':'#e879f9'}">${ch}</span> <span style="color:#665c78;font-size:12px">${d.name}</span>`;
    const pages=d.titles;
    const rows=Math.ceil(pages.length/COLS);
    let rowsHtml='';
    for(let r=0;r<rows;r++){
      let cells='';
      for(let c=0;c<COLS;c++){
        const idx=r*COLS+c;
        if(idx<pages.length){
          const k=ch+'-'+idx;
          const v=st[k]||0;
          const isDed=ded[k]||false;
          const icon=states[v];
          const bg=stateBg[v];
          const title=pages[idx].replace(/"/g,'&quot;');
          const dedCheck=`<div onclick="toggleDedicated(event,'${ch}',${idx})" style="position:absolute;top:2px;right:2px;width:12px;height:12px;border:1px solid ${isDed?'#22c55e':'#555'};border-radius:2px;background:${isDed?'#22c55e':'transparent'};cursor:pointer;font-size:7px;line-height:12px;text-align:center;color:#fff">${isDed?'✓':''}</div>`;
          cells+=`<td onclick="cycleBook('${ch}',${idx})" title="${title}" style="background:${bg};cursor:pointer;text-align:center;padding:8px 4px;border-radius:4px;width:10%;min-width:0;height:52px;user-select:none;transition:background .15s;position:relative;vertical-align:top"><div style="font-size:14px;line-height:1;margin-bottom:2px">${icon||'—'}</div><div style="font-size:9px;color:#665c78;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;line-height:1.3;word-break:break-word" title="${title}">${title}</div>${dedCheck}</td>`;
        } else {
          cells+=`<td style="width:10%;min-width:0"></td>`;
        }
      }
      rowsHtml+=`<tr>${cells}</tr>`;
    }
    html+=`<div class="card" style="margin-bottom:8px;padding:10px 12px"><div style="margin-bottom:6px">${label}</div><table style="width:100%;table-layout:fixed;border-collapse:separate;border-spacing:3px">${rowsHtml}</table></div>`;
  });
  grid.innerHTML=html;
}

// DJ Profile management
function getDJProfile(){return localStorage.getItem('mc-dj-profile')||'Gatsby'}
function saveDJProfile(){
  const sel=document.getElementById('djProfile');
  if(sel)localStorage.setItem('mc-dj-profile',sel.value);
  const label=document.getElementById('djLibLabel');
  if(label)label.textContent=getDJProfile()+"'s Songs";
}
function loadDJProfile(){
  const sel=document.getElementById('djProfile');
  if(!sel)return;
  const saved=getDJProfile();
  // Build profile list from: hardcoded options + localStorage customs + all unique added_by in songs
  const customs=JSON.parse(localStorage.getItem('mc-dj-profiles')||'[]');
  const allSongs=getDJ();
  const songProfiles=[...new Set(allSongs.map(d=>d.added_by).filter(Boolean))];
  const existing=new Set(Array.from(sel.options).map(o=>o.value));
  [...customs,...songProfiles].forEach(name=>{
    if(!existing.has(name)){
      const opt=document.createElement('option');opt.value=name;opt.textContent=name;sel.appendChild(opt);
      existing.add(name);
    }
  });
  sel.value=saved;
  const label=document.getElementById('djLibLabel');
  if(label)label.textContent=saved+"'s Songs";
}
function addDJProfile(){
  const name=prompt('Friend\'s name:');
  if(!name||!name.trim())return;
  const customs=JSON.parse(localStorage.getItem('mc-dj-profiles')||'[]');
  if(!customs.includes(name.trim())){customs.push(name.trim());localStorage.setItem('mc-dj-profiles',JSON.stringify(customs));}
  const sel=document.getElementById('djProfile');
  const opt=document.createElement('option');opt.value=name.trim();opt.textContent=name.trim();sel.appendChild(opt);
  sel.value=name.trim();saveDJProfile();renderDJ();
}
