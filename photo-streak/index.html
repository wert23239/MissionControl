<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Elizabeth Alex Photo Streak</title>
  <style>
    :root {
      font-family: ui-rounded, "SF Pro Rounded", Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --ink: #26151f;
      --muted: #8a6477;
      --pink: #ff5fa2;
      --rose: #ff7a8a;
      --peach: #ffbd73;
      --cream: #fff9f0;
      --card: rgba(255, 255, 255, 0.74);
      --shadow: 0 30px 90px rgba(190, 82, 114, 0.28);
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--ink);
      overflow: hidden;
      background:
        radial-gradient(circle at 15% 18%, rgba(255, 189, 115, 0.65), transparent 28%),
        radial-gradient(circle at 84% 12%, rgba(255, 95, 162, 0.42), transparent 30%),
        radial-gradient(circle at 78% 82%, rgba(255, 122, 138, 0.36), transparent 34%),
        linear-gradient(135deg, #fff6df 0%, #ffe7f1 52%, #fff9f0 100%);
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: auto;
      pointer-events: none;
      filter: blur(0.2px);
      opacity: 0.8;
    }

    body::before {
      width: 440px;
      height: 440px;
      left: -170px;
      bottom: -170px;
      border-radius: 50%;
      background: conic-gradient(from 120deg, rgba(255, 95, 162, 0.28), rgba(255, 189, 115, 0.28), rgba(255, 95, 162, 0.28));
      animation: spin 18s linear infinite;
    }

    body::after {
      width: 340px;
      height: 340px;
      right: -120px;
      top: -120px;
      border-radius: 42% 58% 55% 45%;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.65), rgba(255, 95, 162, 0.18));
      animation: float 7s ease-in-out infinite alternate;
    }

    .confetti {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle, rgba(255, 95, 162, 0.8) 0 2px, transparent 2.5px),
        radial-gradient(circle, rgba(255, 189, 115, 0.8) 0 1.7px, transparent 2.2px),
        radial-gradient(circle, rgba(255, 255, 255, 0.9) 0 1.4px, transparent 1.9px);
      background-size: 96px 96px, 132px 132px, 74px 74px;
      background-position: 8px 20px, 44px 12px, 20px 42px;
      mask-image: linear-gradient(to bottom, transparent 0%, black 14%, black 88%, transparent 100%);
      opacity: 0.62;
    }

    .bubble-field {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .photo-bubble {
      --size: clamp(96px, 18vw, 156px);
      position: absolute;
      display: grid;
      place-items: center;
      width: var(--size);
      height: var(--size);
      border: 7px solid rgba(255, 255, 255, 0.82);
      border-radius: 999px;
      overflow: hidden;
      color: #9a476b;
      background:
        radial-gradient(circle at 35% 24%, rgba(255, 255, 255, 0.95), transparent 24%),
        linear-gradient(135deg, rgba(255, 255, 255, 0.76), rgba(255, 122, 138, 0.28));
      box-shadow: 0 24px 58px rgba(190, 82, 114, 0.28), inset 0 2px 8px rgba(255, 255, 255, 0.7);
      pointer-events: auto;
      cursor: pointer;
      isolation: isolate;
    }

    .photo-bubble::after {
      content: "";
      position: absolute;
      inset: 9px;
      border-radius: inherit;
      border: 1px solid rgba(255, 255, 255, 0.52);
      pointer-events: none;
    }

    .photo-bubble img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    .photo-bubble.has-image img { display: block; }
    .photo-bubble.has-image .bubble-label { display: none; }

    .bubble-label {
      padding: 16px;
      font-size: 0.82rem;
      font-weight: 950;
      line-height: 1.18;
      letter-spacing: 0.08em;
      text-align: center;
      text-transform: uppercase;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.8);
    }

    .bubble-one {
      left: clamp(10px, 5vw, 58px);
      top: clamp(34px, 12vh, 110px);
      animation: bubbleDriftOne 9s ease-in-out infinite alternate;
    }

    .bubble-two {
      right: clamp(12px, 5vw, 64px);
      bottom: clamp(28px, 11vh, 116px);
      animation: bubbleDriftTwo 10.5s ease-in-out infinite alternate;
    }

    .bubble-input {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    main {
      position: relative;
      width: min(94vw, 680px);
      padding: clamp(28px, 6vw, 54px);
      border-radius: 44px;
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.82);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255, 255, 255, 0.9);
      text-align: center;
      backdrop-filter: blur(24px) saturate(1.1);
    }

    .photo-stack {
      position: absolute;
      top: -42px;
      left: 50%;
      width: 116px;
      height: 92px;
      transform: translateX(-50%);
    }

    .photo {
      position: absolute;
      width: 80px;
      height: 68px;
      border: 7px solid white;
      border-bottom-width: 18px;
      border-radius: 9px;
      background: linear-gradient(135deg, #ffd1e4, #ffe6aa);
      box-shadow: 0 13px 24px rgba(113, 63, 18, 0.15);
    }

    .photo:first-child { left: 5px; top: 15px; transform: rotate(-10deg); }
    .photo:last-child { right: 5px; top: 5px; transform: rotate(9deg); }

    .photo::before {
      content: "♥";
      display: grid;
      place-items: center;
      height: 100%;
      color: rgba(255, 95, 162, 0.82);
      font-size: 28px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 18px;
      padding: 9px 14px;
      border-radius: 999px;
      color: #9a476b;
      background: rgba(255, 255, 255, 0.65);
      font-size: 0.83rem;
      font-weight: 900;
      letter-spacing: 0.13em;
      text-transform: uppercase;
    }

    h1 {
      margin: 18px 0 8px;
      font-size: clamp(3rem, 10vw, 6.7rem);
      line-height: 0.86;
      letter-spacing: -0.09em;
    }

    .gradient {
      display: block;
      color: transparent;
      background: linear-gradient(110deg, var(--pink), var(--rose), var(--peach));
      -webkit-background-clip: text;
      background-clip: text;
    }

    .subtitle {
      margin: 18px auto 28px;
      max-width: 30rem;
      color: var(--muted);
      font-size: clamp(1rem, 2vw, 1.16rem);
      line-height: 1.55;
    }

    .counter-wrap {
      position: relative;
      width: min(76vw, 330px);
      margin: 0 auto 28px;
    }

    .counter-wrap::before {
      content: "";
      position: absolute;
      inset: 13px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(255, 95, 162, 0.35), rgba(255, 189, 115, 0.4));
      filter: blur(22px);
      transform: translateY(24px);
      z-index: -1;
    }

    .counter {
      display: grid;
      place-items: center;
      width: 100%;
      aspect-ratio: 1;
      border-radius: 50%;
      background:
        linear-gradient(#fffefb, #fff7fb) padding-box,
        conic-gradient(from 180deg, var(--pink), var(--peach), var(--rose), var(--pink)) border-box;
      border: 12px solid transparent;
      box-shadow: inset 0 -18px 48px rgba(255, 95, 162, 0.08), inset 0 1px 0 white;
    }

    #count {
      display: block;
      font-size: clamp(5.8rem, 24vw, 10.5rem);
      font-weight: 1000;
      line-height: 0.78;
      letter-spacing: -0.1em;
      font-variant-numeric: tabular-nums;
    }

    .flames {
      min-height: 1.6em;
      margin-bottom: 4px;
      font-size: clamp(1.45rem, 5vw, 2.25rem);
      filter: drop-shadow(0 8px 14px rgba(255, 95, 0, 0.25));
    }

    .label {
      margin-top: 15px;
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 950;
      letter-spacing: 0.17em;
      text-transform: uppercase;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-top: 2px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 15px 22px;
      cursor: pointer;
      font: inherit;
      font-weight: 950;
      transition: transform 150ms ease, box-shadow 150ms ease, opacity 150ms ease;
      -webkit-tap-highlight-color: transparent;
    }

    button:hover { transform: translateY(-2px); }
    button:active { transform: translateY(1px) scale(0.98); }

    .primary {
      color: white;
      background: linear-gradient(135deg, var(--pink), var(--rose));
      box-shadow: 0 14px 30px rgba(255, 95, 162, 0.38);
    }

    .secondary {
      color: #7a4159;
      background: rgba(255, 255, 255, 0.78);
      box-shadow: 0 12px 24px rgba(120, 53, 15, 0.10);
    }

    .note {
      min-height: 1.5em;
      margin: 18px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 700;
    }

    .pop { animation: pop 300ms cubic-bezier(.2, 1.7, .4, 1); }
    .celebrate { animation: celebrate 650ms ease; }

    @keyframes pop {
      0% { transform: scale(0.95); }
      70% { transform: scale(1.06); }
      100% { transform: scale(1); }
    }

    @keyframes celebrate {
      0%, 100% { filter: hue-rotate(0deg); }
      50% { filter: hue-rotate(-18deg) saturate(1.25); }
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @keyframes float {
      from { transform: translateY(0) rotate(0deg); }
      to { transform: translateY(30px) rotate(12deg); }
    }

    @keyframes bubbleDriftOne {
      0% { transform: translate3d(0, 0, 0) rotate(-5deg); }
      45% { transform: translate3d(20px, 34px, 0) rotate(4deg); }
      100% { transform: translate3d(58px, -10px, 0) rotate(9deg); }
    }

    @keyframes bubbleDriftTwo {
      0% { transform: translate3d(0, 0, 0) rotate(6deg); }
      50% { transform: translate3d(-34px, -28px, 0) rotate(-5deg); }
      100% { transform: translate3d(-72px, 20px, 0) rotate(-10deg); }
    }

    @media (max-width: 760px) {
      .photo-bubble { --size: clamp(74px, 23vw, 104px); border-width: 5px; }
      .bubble-one { left: 8px; top: 16px; }
      .bubble-two { right: 8px; bottom: 18px; }
      .bubble-label { font-size: 0.66rem; padding: 10px; }
    }

    @media (max-width: 470px) {
      main { border-radius: 34px; }
      .buttons { flex-direction: column; }
      button { width: 100%; }
      .photo-stack { transform: translateX(-50%) scale(0.86); }
    }
  </style>
</head>
<body>
  <div class="confetti" aria-hidden="true"></div>
  <div class="bubble-field" aria-label="Floating photo bubbles">
    <label class="photo-bubble bubble-one" title="Add first floating photo">
      <input class="bubble-input" data-bubble="0" type="file" accept="image/*" aria-label="Add first floating photo" />
      <img alt="First floating photo" />
      <span class="bubble-label">Change photo</span>
    </label>
    <label class="photo-bubble bubble-two" title="Add second floating photo">
      <input class="bubble-input" data-bubble="1" type="file" accept="image/*" aria-label="Add second floating photo" />
      <img alt="Second floating photo" />
      <span class="bubble-label">Change photo</span>
    </label>
  </div>
  <main>
    <div class="photo-stack" aria-hidden="true">
      <div class="photo"></div>
      <div class="photo"></div>
    </div>

    <div class="pill">📸 Elizabeth + Alex</div>
    <h1><span class="gradient">Photo</span> Streak</h1>
    <p class="subtitle">Two days of photos. Keep the streak alive.</p>

    <section class="counter-wrap" aria-live="polite" aria-label="Current photo streak">
      <div class="counter">
        <div>
          <div class="flames" id="flames" aria-hidden="true"></div>
          <span id="count">2</span>
          <div class="label">days</div>
        </div>
      </div>
    </section>

    <div class="buttons">
      <button class="primary" id="increment">+ Add photo</button>
      <button class="secondary" id="decrement">− Undo</button>
      <button class="secondary" id="reset">Reset</button>
    </div>
    <p class="note" id="note"></p>
  </main>

  <script>
    const SUPABASE_URL = "https://aihworyfcgstwbpzkzoy.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFpaHdvcnlmY2dzdHdicHprem95Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMjE0NzEsImV4cCI6MjA4NjY5NzQ3MX0.NrYtMgZ3D5VL-ES6iGXrmg-WEb-fRgU4AHKnLuhcTlE";
    const STORAGE_KEY = "elizabeth-alex-photo-streak";
    const BUBBLE_STORAGE_PREFIX = "elizabeth-alex-photo-bubble-";
    const DEFAULT_BUBBLE_IMAGES = [
      "assets/bubble-1-default.png",
      "assets/instagram-default.svg",
    ];
    const STARTING_STREAK = 2;
    const countEl = document.querySelector("#count");
    const flamesEl = document.querySelector("#flames");
    const counterEl = document.querySelector(".counter");
    const mainEl = document.querySelector("main");
    const noteEl = document.querySelector("#note");
    const buttons = {
      increment: document.querySelector("#increment"),
      decrement: document.querySelector("#decrement"),
      reset: document.querySelector("#reset"),
    };
    const bubbleInputs = [...document.querySelectorAll(".bubble-input")];

    let count = Number.parseInt(localStorage.getItem(STORAGE_KEY) || String(STARTING_STREAK), 10);
    let maxToday = count;
    if (!Number.isFinite(count) || count < STARTING_STREAK) count = STARTING_STREAK;

    function fireText() {
      if (count < 5) return "";
      return "🔥".repeat(Math.min(5, count - 4));
    }

    function setBubbleImage(index, src) {
      const input = bubbleInputs[index];
      if (!input || !src) return;
      const bubble = input.closest(".photo-bubble");
      const image = bubble.querySelector("img");
      image.src = src;
      bubble.classList.add("has-image");
    }

    function loadBubbleImages() {
      bubbleInputs.forEach((input, index) => {
        const savedImage = localStorage.getItem(`${BUBBLE_STORAGE_PREFIX}${index}`);
        setBubbleImage(index, savedImage || DEFAULT_BUBBLE_IMAGES[index]);
      });
    }

    function handleBubbleUpload(input) {
      const file = input.files && input.files[0];
      if (!file) return;
      const index = Number(input.dataset.bubble || 0);
      const reader = new FileReader();
      reader.addEventListener("load", () => {
        const src = String(reader.result || "");
        try { localStorage.setItem(`${BUBBLE_STORAGE_PREFIX}${index}`, src); } catch (error) { console.warn("Couldn't save bubble image", error); }
        setBubbleImage(index, src);
      });
      reader.readAsDataURL(file);
    }

    function setBusy(isBusy) {
      Object.values(buttons).forEach((button) => {
        button.disabled = isBusy;
        button.style.opacity = isBusy ? "0.68" : "";
      });
    }

    function render(message = "") {
      countEl.textContent = count.toLocaleString();
      flamesEl.textContent = fireText();
      noteEl.textContent = message;
      localStorage.setItem(STORAGE_KEY, String(count));
      counterEl.classList.remove("pop");
      mainEl.classList.remove("celebrate");
      void counterEl.offsetWidth;
      counterEl.classList.add("pop");
      mainEl.classList.add("celebrate");
    }

    async function rpc(functionName) {
      const response = await fetch(`${SUPABASE_URL}/rest/v1/rpc/${functionName}`, {
        method: "POST",
        headers: {
          apikey: SUPABASE_ANON_KEY,
          Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
          "Content-Type": "application/json",
        },
        body: "{}",
      });

      if (!response.ok) {
        const details = await response.text();
        throw new Error(`${functionName} failed: ${response.status} ${details}`);
      }

      const rows = await response.json();
      return Array.isArray(rows) ? rows[0] : rows;
    }

    function applyState(row) {
      if (!row) return;
      count = Number(row.count) || STARTING_STREAK;
      maxToday = Number(row.max_today) || count;
    }

    async function loadSharedStreak() {
      try {
        setBusy(true);
        applyState(await rpc("photo_streak_get"));
        render("Synced streak ✨");
      } catch (error) {
        console.error(error);
        render("Offline mode — showing this browser's saved streak");
      } finally {
        setBusy(false);
      }
    }

    async function updateSharedStreak(functionName, successMessage) {
      try {
        setBusy(true);
        const row = await rpc(functionName);
        applyState(row);
        if (functionName === "photo_streak_increment" && row && row.changed === false) {
          render(`Max for today is ${maxToday} day${maxToday === 1 ? "" : "s"} — come back tomorrow ✨`);
        } else {
          render(successMessage());
        }
      } catch (error) {
        console.error(error);
        render("Couldn't sync — try again in a sec");
      } finally {
        setBusy(false);
      }
    }

    buttons.increment.addEventListener("click", () => {
      updateSharedStreak("photo_streak_increment", () => count >= 5 ? "Streak is on fire 🔥" : count === 3 ? "Three days of photos ✨" : "Photo streak updated ✨");
    });

    buttons.decrement.addEventListener("click", () => {
      updateSharedStreak("photo_streak_decrement", () => count === STARTING_STREAK ? "Back to 2 days of photos" : "Undone");
    });

    buttons.reset.addEventListener("click", () => {
      if (count === STARTING_STREAK || confirm("Reset the shared photo streak to 2?")) {
        updateSharedStreak("photo_streak_reset", () => "Reset to 2");
      }
    });

    bubbleInputs.forEach((input) => {
      input.addEventListener("change", () => handleBubbleUpload(input));
    });

    loadBubbleImages();
    render("Loading shared streak…");
    loadSharedStreak();
  </script>
</body>
</html>
